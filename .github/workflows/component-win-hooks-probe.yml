name: component-win-hooks-probe

# Settle the "UNVERIFIED" note in Performant_Isabelle_ML/conda/recipe.yaml on a REAL
# windows-latest runner.  Four questions, each answered with echoed evidence:
#
#   Q1  does conda run Scripts/.<name>-post-link.bat for a **noarch: generic** package
#       on Windows, with %PREFIX% set?  (the base package's probes covered only a
#       platform-specific package)
#   Q2  does the recipe's pure-batch native->Cygwin conversion produce the intended
#       string?  Stressed with a %PREFIX% containing SPACES and with a non-C: drive.
#   Q3  THE SHARP ONE: does `isabelle.bat components -u` accept /cygdrive/C/... with an
#       UPPERCASE drive letter?  If not, does /cygdrive/c/... work (=> the recipe needs
#       a lowercasing step)?  Run in ISOLATION and BEFORE the full install, so the
#       answer survives any later breakage.
#   Q4  end to end: conda install -> component registered + `isabelle build` works;
#       conda remove -> entry gone (pre-unlink -x).
#
# Strictly read-only w.r.t. conda.qiyuan.me: the package under test is built here and
# served from a local channel; nothing is ever uploaded.  Manual trigger only.
on:
  workflow_dispatch:

jobs:
  # The recipe's build script is `interpreter: bash`, so build it on Linux and hand the
  # artifact (already indexed as a channel) to the Windows job.
  build:
    name: "Build the noarch package + index a local channel"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: xqyww123/Performant_Isabelle_ML
          path: pml

      - uses: actions/checkout@v4
        with:
          path: ci

      # The recipe under test is NOT yet on xqyww123/Performant_Isabelle_ML's main (it
      # exists only as a local commit).  So the probe carries a byte-exact copy --
      # sha256 e15b18b728ddd095e9eb50f552ff546b891bfb224daa351685d36d2e9a01034f -- and
      # drops it into the checked-out source tree at the path the recipe expects
      # (`source: - path: ../`).  It is printed below so the log shows exactly what was
      # built.  DELETE this step once the recipe is pushed, and check out the repo alone.
      - name: "Place the recipe under test (vendored copy; not yet on PML main)"
        run: |
          set -euo pipefail
          if [ -f pml/conda/recipe.yaml ]; then
            echo "PML main now ships conda/recipe.yaml -- using THAT, ignoring the copy"
          else
            mkdir -p pml/conda
            cp ci/probe-assets/isabelle-performant-ml-recipe.yaml pml/conda/recipe.yaml
            echo "used the vendored copy"
          fi
          sha256sum pml/conda/recipe.yaml
          echo "===== recipe under test ====="
          cat pml/conda/recipe.yaml

      - name: Install rattler-build
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/rattler-build \
            https://github.com/prefix-dev/rattler-build/releases/download/v0.69.1/rattler-build-x86_64-unknown-linux-musl
          chmod +x /tmp/rattler-build
          /tmp/rattler-build --version

      - name: Build isabelle-performant-ml (noarch)
        env:
          ISA_COMPONENT_VERSION: 0.1.0
        run: |
          set -euo pipefail
          /tmp/rattler-build build \
            --recipe pml/conda/recipe.yaml \
            --output-dir "$GITHUB_WORKSPACE/out" \
            --build-num 0 \
            --no-test
          find "$GITHUB_WORKSPACE/out" -name '*.conda' -printf '  %10s  %p\n'

      - name: "Show the generated .bat hooks (byte-exact) for the record"
        run: |
          set -euo pipefail
          pkg=$(find "$GITHUB_WORKSPACE/out" -name 'isabelle-performant-ml-*.conda' | head -1)
          pip install --quiet zstandard
          work=$(mktemp -d)
          python3 -c "import sys,zipfile,tarfile,io,zstandard; z=zipfile.ZipFile(sys.argv[1]); b=next(n for n in z.namelist() if n.startswith('pkg-') and n.endswith('.tar.zst')); r=zstandard.ZstdDecompressor().stream_reader(io.BytesIO(z.read(b))); tarfile.open(fileobj=io.BytesIO(r.read())).extractall(sys.argv[2])" "$pkg" "$work"
          for f in Scripts/.isabelle-performant-ml-post-link.bat \
                   Scripts/.isabelle-performant-ml-pre-unlink.bat ; do
            echo "===== $f ====="
            cat -A "$work/$f"
          done

      - name: "Index it into a local channel (done here: conda-forge TLS is flaky on win)"
        run: |
          set -euo pipefail
          # into the runner's preinstalled miniconda, so conda_index finds `conda` itself
          sudo "$CONDA/bin/python" -m pip install --quiet conda-index
          CH="$GITHUB_WORKSPACE/local-channel"
          mkdir -p "$CH/noarch"
          find "$GITHUB_WORKSPACE/out" -name '*.conda' -exec cp {} "$CH/noarch/" \;
          "$CONDA/bin/python" -m conda_index "$CH" --no-zst --no-bz2 --channeldata --channel-name local
          find "$CH" -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name: local-channel
          path: local-channel/**
          if-no-files-found: error

  probe:
    name: "Windows: answer Q1-Q4"
    needs: build
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-activate-base: true
          activate-environment: ""

      - uses: actions/download-artifact@v4
        with:
          name: local-channel
          path: ${{ runner.temp }}/local-channel

      - name: "Runner facts: drives, RUNNER_TEMP, channel layout"
        shell: bash -l {0}
        run: |
          set -euo pipefail
          echo "RUNNER_TEMP=[$RUNNER_TEMP]"
          echo "USERPROFILE=[${USERPROFILE:-}]"
          wmic logicaldisk get name 2>/dev/null || true
          ls -R "$RUNNER_TEMP/local-channel" | head -50

      # ---------------------------------------------------------------------------
      # Q3 FIRST, in isolation: install ONLY the base isabelle and hit
      # `isabelle.bat components -u` with an uppercase and a lowercase cygdrive path.
      # ---------------------------------------------------------------------------
      - name: "Q3 setup: install the base isabelle alone"
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda create -y -p "$RUNNER_TEMP/isa" \
            -c https://conda.qiyuan.me --override-channels isabelle
          ls "$RUNNER_TEMP/isa/isa/bin/"

      - name: "Q3: does isabelle.bat components -u accept /cygdrive/C vs /cygdrive/c?"
        shell: cmd
        run: |
          set "ISA=%RUNNER_TEMP%\isa\isa"
          rem a minimal but VALID component: a directory containing a ROOT
          mkdir C:\q3comp 2>nul
          echo session Q3 = Pure> C:\q3comp\ROOT
          echo ---- built the test component at C:\q3comp ----
          dir C:\q3comp

          rem warm Cygwin once; the runner's ~/.bash_profile is broken so the first
          rem isabelle.bat invocation may return nonzero for unrelated reasons
          call "%ISA%\bin\isabelle.bat" version
          echo WARMUP_EXIT=%ERRORLEVEL%

          rem locate ISABELLE_HOME_USER (Cygwin form) and convert it back to native
          set "ISAU="
          for /f "delims=" %%d in ('call "%ISA%\bin\isabelle.bat" getenv -b ISABELLE_HOME_USER 2^>nul') do set "ISAU=%%d"
          echo ISABELLE_HOME_USER=[%ISAU%]
          set "P=%ISAU:/cygdrive/=%"
          set "DL=%P:~0,1%"
          set "REST=%P:~1%"
          set "ISAUW=%DL%:%REST%"
          set "ISAUW=%ISAUW:/=\%"
          echo ISABELLE_HOME_USER_NATIVE=[%ISAUW%]
          set "COMPFILE=%ISAUW%\etc\components"

          rem ---------------- UPPERCASE drive letter ----------------
          echo ================ Q3-UPPER ================
          echo RUNNING: isabelle.bat components -u "/cygdrive/C/q3comp"
          call "%ISA%\bin\isabelle.bat" components -u "/cygdrive/C/q3comp"
          echo Q3_UPPER_EXIT=%ERRORLEVEL%
          echo ---- %COMPFILE% after UPPER ----
          if exist "%COMPFILE%" (type "%COMPFILE%") else (echo ^(components file does not exist^))
          echo ---- end ----

          rem ---------------- lowercase drive letter ----------------
          echo ================ Q3-LOWER ================
          echo RUNNING: isabelle.bat components -u "/cygdrive/c/q3comp"
          call "%ISA%\bin\isabelle.bat" components -u "/cygdrive/c/q3comp"
          echo Q3_LOWER_EXIT=%ERRORLEVEL%
          echo ---- %COMPFILE% after LOWER ----
          if exist "%COMPFILE%" (type "%COMPFILE%") else (echo ^(components file does not exist^))
          echo ---- end ----

          rem ---------------- for contrast: the NATIVE path the recipe avoids -------
          echo ================ Q3-NATIVE (expected to fail) ================
          echo RUNNING: isabelle.bat components -u "C:\q3comp"
          call "%ISA%\bin\isabelle.bat" components -u "C:\q3comp"
          echo Q3_NATIVE_EXIT=%ERRORLEVEL%
          echo ---- %COMPFILE% after NATIVE ----
          if exist "%COMPFILE%" (type "%COMPFILE%") else (echo ^(components file does not exist^))
          echo ---- end ----

          rem ---------------- and -x removes again ----------------
          echo ================ Q3-REMOVE ================
          call "%ISA%\bin\isabelle.bat" components -x "/cygdrive/C/q3comp"
          echo Q3_XU_EXIT=%ERRORLEVEL%
          call "%ISA%\bin\isabelle.bat" components -x "/cygdrive/c/q3comp"
          echo Q3_XL_EXIT=%ERRORLEVEL%
          echo ---- %COMPFILE% after -x ----
          if exist "%COMPFILE%" (type "%COMPFILE%") else (echo ^(components file does not exist^))
          exit /b 0

      - name: "Q3b: does isabelle SEE a component registered with the UPPERCASE path?"
        shell: cmd
        run: |
          set "ISA=%RUNNER_TEMP%\isa\isa"
          call "%ISA%\bin\isabelle.bat" components -u "/cygdrive/C/q3comp" >nul 2>&1
          echo ---- isabelle components (dump) ----
          call "%ISA%\bin\isabelle.bat" getenv -b ISABELLE_COMPONENTS
          echo GETENV_EXIT=%ERRORLEVEL%
          echo ---- can isabelle resolve the session defined there? ----
          call "%ISA%\bin\isabelle.bat" build -n -l Q3
          echo BUILD_N_EXIT=%ERRORLEVEL%
          call "%ISA%\bin\isabelle.bat" components -x "/cygdrive/C/q3comp" >nul 2>&1
          exit /b 0

      # ---------------------------------------------------------------------------
      # Q1: does conda run a noarch package's Scripts/*.bat hooks on Windows?
      # A hand-built noarch: generic package that writes a marker naming %PREFIX%.
      # ---------------------------------------------------------------------------
      - name: "Q1: build a tiny NOARCH package whose post-link/pre-unlink .bat marks"
        shell: bash -l {0}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, json, hashlib, tarfile
          os.makedirs("pkgN/Scripts", exist_ok=True); os.makedirs("pkgN/info", exist_ok=True)
          rels = []
          for action, tag in (("post-link", "POST-LINK"), ("pre-unlink", "PRE-UNLINK")):
              rel = "Scripts/.noarchprobe-%s.bat" % action
              rels.append(rel)
              bat = "\r\n".join([
                  "@echo off",
                  'echo %s-RAN PREFIX=[%%PREFIX%%] > "%%RUNNER_TEMP%%\\noarch_%s.txt"' % (tag, action),
                  "exit /b 0",
              ]) + "\r\n"
              open("pkgN/" + rel, "w", newline="").write(bat)
          json.dump({"name": "noarchprobe", "version": "0.0.1", "build": "0",
                     "build_number": 0, "subdir": "noarch", "depends": [],
                     "noarch": "generic", "platform": None, "arch": None},
                    open("pkgN/info/index.json", "w"))
          # package_metadata_version is MANDATORY: without it conda refuses the package
          # with "The current version of conda is too old ... (link.json schema version 1)"
          json.dump({"package_metadata_version": 1, "noarch": {"type": "generic"}},
                    open("pkgN/info/link.json", "w"))
          paths = []
          for rel in rels:
              b = open("pkgN/" + rel, "rb").read()
              paths.append({"_path": rel, "path_type": "hardlink",
                            "sha256": hashlib.sha256(b).hexdigest(),
                            "size_in_bytes": len(b)})
          json.dump({"paths_version": 1, "paths": paths}, open("pkgN/info/paths.json", "w"))
          open("pkgN/info/files", "w").write("".join(r + "\n" for r in rels))
          with tarfile.open("noarchprobe-0.0.1-0.tar.bz2", "w:bz2") as t:
              for root, _, files in os.walk("pkgN"):
                  for fn in files:
                      full = os.path.join(root, fn)
                      t.add(full, arcname=os.path.relpath(full, "pkgN"))
          print("built noarchprobe-0.0.1-0.tar.bz2")
          PY

      - name: "Q1: install then remove the noarch package -- both hooks must run"
        shell: bash -l {0}
        run: |
          # deliberately NOT -e: Q1 is diagnostic, it must not abort Q2/Q4
          set -uo pipefail
          rm -f "$RUNNER_TEMP/noarch_post-link.txt" "$RUNNER_TEMP/noarch_pre-unlink.txt"
          conda create -y -p "$RUNNER_TEMP/eN" ./noarchprobe-0.0.1-0.tar.bz2 2>&1 | tail -20
          if [ -f "$RUNNER_TEMP/noarch_post-link.txt" ]; then
            echo "Q1 POST-LINK PASS:"; cat "$RUNNER_TEMP/noarch_post-link.txt"
          else
            echo "Q1 POST-LINK FAIL: conda did NOT run Scripts/.<name>-post-link.bat for noarch"
          fi
          conda remove -y -p "$RUNNER_TEMP/eN" noarchprobe 2>&1 | tail -20
          if [ -f "$RUNNER_TEMP/noarch_pre-unlink.txt" ]; then
            echo "Q1 PRE-UNLINK PASS:"; cat "$RUNNER_TEMP/noarch_pre-unlink.txt"
          else
            echo "Q1 PRE-UNLINK FAIL: conda did NOT run Scripts/.<name>-pre-unlink.bat for noarch"
          fi

      # ---------------------------------------------------------------------------
      # Q2: run the recipe's OWN conversion lines, verbatim, against hostile prefixes.
      # ---------------------------------------------------------------------------
      - name: "Q2: the recipe's conversion, verbatim, on hostile %PREFIX% values"
        shell: cmd
        run: |
          echo ================ Q2: plain C: prefix ================
          set "PREFIX=C:\Users\runneradmin\envs\t"
          call :conv
          echo ================ Q2: prefix WITH SPACES ================
          set "PREFIX=C:\Program Files\my env\t"
          call :conv
          echo ================ Q2: non-C: drive ================
          set "PREFIX=D:\a\_temp\e"
          call :conv
          echo ================ Q2: RUNNER_TEMP-based prefix (real) ================
          set "PREFIX=%RUNNER_TEMP%\isa"
          call :conv
          exit /b 0

          :conv
          rem --- these six lines are copied verbatim from conda/recipe.yaml ---
          set "COMP=%PREFIX%\share\isabelle-performant-ml"
          set "DL=%COMP:~0,1%"
          set "REST=%COMP:~2%"
          set "REST=%REST:\=/%"
          set "CYG=/cygdrive/%DL%%REST%"
          echo   PREFIX=[%PREFIX%]
          echo   COMP=[%COMP%]
          echo   DL=[%DL%]
          echo   CYG=[%CYG%]
          goto :eof

      # ---------------------------------------------------------------------------
      # Q4 (and Q1/Q2 for the REAL package): install it for real.
      # ---------------------------------------------------------------------------
      - name: "Q4: conda install isabelle-performant-ml from the local channel"
        shell: bash -l {0}
        run: |
          set -euo pipefail
          CH="$(echo "$RUNNER_TEMP/local-channel" | tr '\\' '/')"
          echo "channel dir = $CH"
          conda create -y -n t -c "file:///$CH" -c https://conda.qiyuan.me \
            --override-channels isabelle-performant-ml 2>&1 | tee inst.log
          if grep -qi "LinkError\|post-link script failed" inst.log; then
            echo "::warning::the install reported a link failure"
          fi
          conda activate t
          conda list | grep -i isabelle

      - name: "Q2-real: what the SHIPPED post-link.bat computes (logic copy, echoed)"
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda activate t
          # hand the REAL env prefix (native form) to the cmd step below
          echo "REAL_PREFIX=$(cygpath -w "$CONDA_PREFIX" 2>/dev/null || echo "$CONDA_PREFIX")" >> "$GITHUB_ENV"
          echo "===== shipped Scripts/.isabelle-performant-ml-post-link.bat ====="
          cat -A "$CONDA_PREFIX/Scripts/.isabelle-performant-ml-post-link.bat" || true
          echo "===== shipped Scripts/.isabelle-performant-ml-pre-unlink.bat ====="
          cat -A "$CONDA_PREFIX/Scripts/.isabelle-performant-ml-pre-unlink.bat" || true
          # Same file with the `call` line replaced by echoes: the conversion lines are
          # byte-identical, so the printed CYG is what the real hook passed to isabelle.
          sed -e 's#^call .*#echo COMP=[%COMP%]\r\necho CYG=[%CYG%]#' \
            "$CONDA_PREFIX/Scripts/.isabelle-performant-ml-post-link.bat" \
            > "$RUNNER_TEMP/echo-hook.bat"
          echo "===== derived echo-only hook ====="
          cat "$RUNNER_TEMP/echo-hook.bat"

      - name: "Q2-real: run the derived echo-only hook with the real %PREFIX%"
        shell: cmd
        run: |
          set "PREFIX=%REAL_PREFIX%"
          echo REAL_PREFIX=[%PREFIX%]
          call "%RUNNER_TEMP%\echo-hook.bat"
          exit /b 0

      # cmd, NOT Git-Bash: the base package's own post-link says so -- conda is not on
      # PATH under Git-Bash, so `isabelle` is `command not found` there.  We call
      # isabelle.bat out of the env prefix directly and skip activation entirely.
      - name: "Q4: is the component registered in ISABELLE_HOME_USER/etc/components?"
        shell: cmd
        run: |
          set "ISA=%REAL_PREFIX%\isa"
          call "%ISA%\bin\isabelle.bat" version
          set "ISAU="
          for /f "delims=" %%d in ('call "%ISA%\bin\isabelle.bat" getenv -b ISABELLE_HOME_USER 2^>nul') do set "ISAU=%%d"
          echo ISABELLE_HOME_USER=[%ISAU%]
          set "P=%ISAU:/cygdrive/=%"
          set "DL=%P:~0,1%"
          set "REST=%P:~1%"
          set "ISAUW=%DL%:%REST%"
          set "ISAUW=%ISAUW:/=\%"
          set "COMPFILE=%ISAUW%\etc\components"
          echo COMPFILE=[%COMPFILE%]
          echo COMPFILE=%COMPFILE%>> "%GITHUB_ENV%"
          echo ----- etc/components -----
          if exist "%COMPFILE%" (type "%COMPFILE%") else (echo ^(no components file^))
          echo --------------------------
          findstr /C:"isabelle-performant-ml" "%COMPFILE%" >nul 2>&1 && (echo Q4-REGISTER PASS) || (echo Q4-REGISTER FAIL: the post-link did not register the component)
          exit /b 0

      - name: "Q4: isabelle build Performant_Isabelle_ML"
        shell: cmd
        run: |
          set "ISA=%REAL_PREFIX%\isa"
          call "%ISA%\bin\isabelle.bat" build -v Performant_Isabelle_ML
          echo Q4_BUILD_EXIT=%ERRORLEVEL%
          exit /b 0

      - name: "Q4: conda remove -- the pre-unlink must unregister it"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          conda remove -y -n t isabelle-performant-ml 2>&1 | tail -20
          echo "removal exit=$?"

      - name: "Q4: etc/components after conda remove"
        shell: cmd
        run: |
          echo ----- etc/components after conda remove -----
          if exist "%COMPFILE%" (type "%COMPFILE%") else (echo ^(no components file^))
          echo ---------------------------------------------
          findstr /C:"isabelle-performant-ml" "%COMPFILE%" >nul 2>&1 && (echo Q4-UNREGISTER FAIL: entry still present after conda remove) || (echo Q4-UNREGISTER PASS: entry gone)
          exit /b 0

      # ---------------------------------------------------------------------------
      # Diagnostics for a FAILED Q4 registration.  The hook swallows every message
      # (`>nul 2>&1`), so replay its logic by hand, unredirected, and separately test
      # whether a WARMED isabelle (one that has already run once in that prefix)
      # changes the outcome -- i.e. whether the first-ever isabelle.bat run, which
      # initialises Cygwin, is what fails inside conda's link step.
      # ---------------------------------------------------------------------------
      - name: "D1: fresh single-shot install into env u"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          CH="$(echo "$RUNNER_TEMP/local-channel" | tr '\\' '/')"
          conda create -y -n u -c "file:///$CH" -c https://conda.qiyuan.me \
            --override-channels isabelle-performant-ml 2>&1 | tail -25
          echo "PREFIX_U=$CONDA\\envs\\u" >> "$GITHUB_ENV"

      - name: "D2: what the hook WOULD have said, unredirected"
        shell: cmd
        run: |
          set "PREFIX=%PREFIX_U%"
          echo PREFIX=[%PREFIX%]
          echo ---- does the component dir exist? ----
          dir "%PREFIX%\share"
          echo ---- is isabelle.bat there? ----
          if exist "%PREFIX%\isa\bin\isabelle.bat" (echo isabelle.bat: present) else (echo isabelle.bat: MISSING)
          echo ---- the shipped hooks ----
          dir "%PREFIX%\Scripts\.isabelle-performant-ml-*"
          echo ---- components file BEFORE the manual run ----
          set "ISAU="
          for /f "delims=" %%d in ('call "%PREFIX%\isa\bin\isabelle.bat" getenv -b ISABELLE_HOME_USER 2^>nul') do set "ISAU=%%d"
          set "P=%ISAU:/cygdrive/=%"
          set "DL2=%P:~0,1%"
          set "REST2=%P:~1%"
          set "ISAUW=%DL2%:%REST2%"
          set "ISAUW=%ISAUW:/=\%"
          set "CF=%ISAUW%\etc\components"
          echo CF=[%CF%]
          echo CF=%CF%>> "%GITHUB_ENV%"
          if exist "%CF%" (type "%CF%") else (echo ^(no components file^))
          echo ---- replay the hook's own lines, UNREDIRECTED ----
          set "COMP=%PREFIX%\share\isabelle-performant-ml"
          set "DL=%COMP:~0,1%"
          set "REST=%COMP:~2%"
          set "REST=%REST:\=/%"
          set "CYG=/cygdrive/%DL%%REST%"
          echo COMP=[%COMP%]
          echo CYG=[%CYG%]
          call "%PREFIX%\isa\bin\isabelle.bat" components -u "%CYG%"
          echo D2_MANUAL_EXIT=%ERRORLEVEL%
          echo ---- components file AFTER the manual run ----
          if exist "%CF%" (type "%CF%") else (echo ^(no components file^))
          exit /b 0

      - name: "D3: with isabelle already warm, does a re-install register?"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          CH="$(echo "$RUNNER_TEMP/local-channel" | tr '\\' '/')"
          conda remove -y -n u isabelle-performant-ml 2>&1 | tail -5
          conda install -y -n u -c "file:///$CH" -c https://conda.qiyuan.me \
            --override-channels isabelle-performant-ml 2>&1 | tail -15

      - name: "D3: components after the warm re-install"
        shell: cmd
        run: |
          if exist "%CF%" (type "%CF%") else (echo ^(no components file^))
          findstr /C:"isabelle-performant-ml" "%CF%" >nul 2>&1 && (echo D3 PASS: warm re-install DID register) || (echo D3 FAIL: warm re-install did NOT register either)
          exit /b 0

      # E: is the cause LINK ORDER -- i.e. does the component's post-link run before the
      # `isabelle` package has been linked, so that %PREFIX%\isa\bin\isabelle.bat does
      # not exist yet and the `call` fails into the mandatory `exit /b 0`?
      - name: "E1: install isabelle ALONE first"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          conda create -y -n w -c https://conda.qiyuan.me --override-channels isabelle 2>&1 | tail -5
          echo "PREFIX_W=$CONDA\\envs\\w" >> "$GITHUB_ENV"

      - name: "E1: record env w's components file (isabelle only)"
        shell: cmd
        run: |
          set "ISAU="
          for /f "delims=" %%d in ('call "%PREFIX_W%\isa\bin\isabelle.bat" getenv -b ISABELLE_HOME_USER 2^>nul') do set "ISAU=%%d"
          set "P=%ISAU:/cygdrive/=%"
          set "DL2=%P:~0,1%"
          set "REST2=%P:~1%"
          set "CFW=%DL2%:%REST2%"
          set "CFW=%CFW:/=\%"
          set "CFW=%CFW%\etc\components"
          echo CFW=[%CFW%]
          echo CFW=%CFW%>> "%GITHUB_ENV%"
          if exist "%CFW%" (type "%CFW%") else (echo ^(no components file^))
          exit /b 0

      - name: "E1: NOW add the component to that existing env"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          CH="$(echo "$RUNNER_TEMP/local-channel" | tr '\\' '/')"
          conda install -y -n w -c "file:///$CH" -c https://conda.qiyuan.me \
            --override-channels isabelle-performant-ml 2>&1 | tail -15

      - name: "E1 verdict + E2: invoke the SHIPPED .bat exactly as conda would"
        shell: cmd
        run: |
          echo ---- components after adding the component to a pre-existing isabelle ----
          if exist "%CFW%" (type "%CFW%") else (echo ^(no components file^))
          findstr /C:"isabelle-performant-ml" "%CFW%" >nul 2>&1 && (echo E1 PASS: registered when isabelle was ALREADY installed -- so the failure is LINK ORDER) || (echo E1 FAIL: still not registered even with isabelle pre-installed)
          echo.
          echo ================ E2: run the shipped post-link.bat by hand ================
          set "PREFIX=%PREFIX_W%"
          call "%PREFIX%\Scripts\.isabelle-performant-ml-post-link.bat"
          echo E2_EXIT=%ERRORLEVEL%
          if exist "%CFW%" (type "%CFW%") else (echo ^(no components file^))
          findstr /C:"isabelle-performant-ml" "%CFW%" >nul 2>&1 && (echo E2 PASS: the shipped .bat itself registers correctly) || (echo E2 FAIL: the shipped .bat does not register even by hand)
          exit /b 0

      # F: E1 confounds two explanations -- in env w, isabelle was BOTH linked in an
      # earlier transaction AND already run once by us (Cygwin self-heals on the first
      # `isabelle` call).  Env y separates them: isabelle installed in its own
      # transaction but NEVER invoked, then the component added.
      #   registers  => the cause is purely conda LINK ORDER inside one transaction
      #   fails      => the cause is the COLD first-ever isabelle run (Cygwin init)
      #                 happening inside conda's post-link subprocess
      - name: "F: conda's LINK ORDER for a one-shot install (dry run)"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          CH="$(echo "$RUNNER_TEMP/local-channel" | tr '\\' '/')"
          conda create --dry-run --json -n zz -c "file:///$CH" -c https://conda.qiyuan.me \
            --override-channels isabelle-performant-ml > dry.json 2>/dev/null
          python -c "import json;d=json.load(open('dry.json'));print('LINK order:');[print('  %2d %s' % (i,p.get('name'))) for i,p in enumerate(d['actions']['LINK'])]"

      - name: "F: install isabelle alone into env y and NEVER run it"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          conda create -y -n y -c https://conda.qiyuan.me --override-channels isabelle 2>&1 | tail -3
          echo "PREFIX_Y=$CONDA\\envs\\y" >> "$GITHUB_ENV"
          # do NOT invoke isabelle here: Cygwin must stay cold

      - name: "F: add the component to the cold env y"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          CH="$(echo "$RUNNER_TEMP/local-channel" | tr '\\' '/')"
          conda install -y -n y -c "file:///$CH" -c https://conda.qiyuan.me \
            --override-channels isabelle-performant-ml 2>&1 | tail -10

      - name: "F verdict"
        shell: cmd
        run: |
          set "ISAU="
          for /f "delims=" %%d in ('call "%PREFIX_Y%\isa\bin\isabelle.bat" getenv -b ISABELLE_HOME_USER 2^>nul') do set "ISAU=%%d"
          set "P=%ISAU:/cygdrive/=%"
          set "DL2=%P:~0,1%"
          set "REST2=%P:~1%"
          set "CFY=%DL2%:%REST2%"
          set "CFY=%CFY:/=\%"
          set "CFY=%CFY%\etc\components"
          echo CFY=[%CFY%]
          if exist "%CFY%" (type "%CFY%") else (echo ^(no components file^))
          findstr /C:"isabelle-performant-ml" "%CFY%" >nul 2>&1 && (echo F PASS: registered into a COLD but already-linked isabelle -- cause is conda LINK ORDER) || (echo F FAIL: not registered even though isabelle was already linked -- cause is the COLD first isabelle run)
          exit /b 0

      # G: the real hook throws every message away (`>nul 2>&1`), so we never see WHY it
      # fails.  Ship a probe-only noarch package whose post-link is byte-for-byte the
      # recipe's, except that it logs to a file instead of nul -- and install it into a
      # cold env with isabelle already linked, i.e. exactly the F scenario.
      - name: "G: build a logging clone of the hook as a noarch package"
        shell: bash -l {0}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, json, hashlib, tarfile
          root = "pkgG"
          os.makedirs(root + "/Scripts", exist_ok=True)
          os.makedirs(root + "/info", exist_ok=True)
          os.makedirs(root + "/share/isabelle-performant-ml", exist_ok=True)
          rels = ["share/isabelle-performant-ml/ROOT",
                  "Scripts/.hooklogprobe-post-link.bat"]
          open(root + "/" + rels[0], "w", newline="").write("session HookProbe = Pure\n")
          bat = "\r\n".join([
              "@echo off",
              'set "COMP=%PREFIX%\\share\\isabelle-performant-ml"',
              'set "DL=%COMP:~0,1%"',
              'set "REST=%COMP:~2%"',
              'set "REST=%REST:\\=/%"',
              'set "CYG=/cygdrive/%DL%%REST%"',
              '> "%PREFIX%\\hooklog.txt" echo PREFIX=[%PREFIX%] CYG=[%CYG%]',
              'call "%PREFIX%\\isa\\bin\\isabelle.bat" components -u "%CYG%" >> "%PREFIX%\\hooklog.txt" 2>&1',
              '>> "%PREFIX%\\hooklog.txt" echo ISABELLE_EXIT=%ERRORLEVEL%',
              "exit /b 0",
          ]) + "\r\n"
          open(root + "/" + rels[1], "w", newline="").write(bat)
          json.dump({"name": "hooklogprobe", "version": "0.0.1", "build": "0",
                     "build_number": 0, "subdir": "noarch", "depends": [],
                     "noarch": "generic", "platform": None, "arch": None},
                    open(root + "/info/index.json", "w"))
          json.dump({"package_metadata_version": 1, "noarch": {"type": "generic"}},
                    open(root + "/info/link.json", "w"))
          paths = []
          for rel in rels:
              b = open(root + "/" + rel, "rb").read()
              paths.append({"_path": rel, "path_type": "hardlink",
                            "sha256": hashlib.sha256(b).hexdigest(),
                            "size_in_bytes": len(b)})
          json.dump({"paths_version": 1, "paths": paths}, open(root + "/info/paths.json", "w"))
          open(root + "/info/files", "w").write("".join(r + "\n" for r in rels))
          with tarfile.open("hooklogprobe-0.0.1-0.tar.bz2", "w:bz2") as t:
              for d, _, files in os.walk(root):
                  for fn in files:
                      full = os.path.join(d, fn)
                      t.add(full, arcname=os.path.relpath(full, root))
          print("built hooklogprobe-0.0.1-0.tar.bz2")
          PY

      - name: "G: cold env z with isabelle, then install the logging clone"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          conda create -y -n z -c https://conda.qiyuan.me --override-channels isabelle 2>&1 | tail -3
          # isabelle is NEVER invoked here -- Cygwin stays cold, as in F
          conda install -y -n z ./hooklogprobe-0.0.1-0.tar.bz2 2>&1 | tail -10
          echo "PREFIX_Z=$CONDA\\envs\\z" >> "$GITHUB_ENV"

      - name: "G: WHAT DID THE HOOK ACTUALLY SAY?"
        shell: cmd
        run: |
          echo ================ hooklog.txt ================
          if exist "%PREFIX_Z%\hooklog.txt" (type "%PREFIX_Z%\hooklog.txt") else (echo ^(the hook never even created its log -- it did not run^))
          echo =============================================
          exit /b 0

      # H: G showed the first-ever isabelle call dies with
      # "Could not find or load main class isabelle.Components" -- that call is the one
      # that runs cygwin_init, and its own Java classpath is computed before the heal.
      # Candidate fix: make a THROWAWAY isabelle call first, then `components -u`.
      # Test it exactly like G, in a cold env with isabelle already linked.
      - name: "H: build a warm-up-first clone of the hook"
        shell: bash -l {0}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, json, hashlib, tarfile
          root = "pkgH"
          os.makedirs(root + "/Scripts", exist_ok=True)
          os.makedirs(root + "/info", exist_ok=True)
          os.makedirs(root + "/share/isabelle-performant-ml", exist_ok=True)
          rels = ["share/isabelle-performant-ml/ROOT",
                  "Scripts/.warmhookprobe-post-link.bat"]
          open(root + "/" + rels[0], "w", newline="").write("session HookProbe = Pure\n")
          bat = "\r\n".join([
              "@echo off",
              'set "COMP=%PREFIX%\\share\\isabelle-performant-ml"',
              'set "DL=%COMP:~0,1%"',
              'set "REST=%COMP:~2%"',
              'set "REST=%REST:\\=/%"',
              'set "CYG=/cygdrive/%DL%%REST%"',
              '> "%PREFIX%\\warmlog.txt" echo CYG=[%CYG%]',
              # the throwaway call that lets Cygwin heal itself
              'call "%PREFIX%\\isa\\bin\\isabelle.bat" getenv -b ISABELLE_HOME >> "%PREFIX%\\warmlog.txt" 2>&1',
              '>> "%PREFIX%\\warmlog.txt" echo WARMUP_EXIT=%ERRORLEVEL%',
              'call "%PREFIX%\\isa\\bin\\isabelle.bat" components -u "%CYG%" >> "%PREFIX%\\warmlog.txt" 2>&1',
              '>> "%PREFIX%\\warmlog.txt" echo COMPONENTS_EXIT=%ERRORLEVEL%',
              "exit /b 0",
          ]) + "\r\n"
          open(root + "/" + rels[1], "w", newline="").write(bat)
          json.dump({"name": "warmhookprobe", "version": "0.0.1", "build": "0",
                     "build_number": 0, "subdir": "noarch", "depends": [],
                     "noarch": "generic", "platform": None, "arch": None},
                    open(root + "/info/index.json", "w"))
          json.dump({"package_metadata_version": 1, "noarch": {"type": "generic"}},
                    open(root + "/info/link.json", "w"))
          paths = []
          for rel in rels:
              b = open(root + "/" + rel, "rb").read()
              paths.append({"_path": rel, "path_type": "hardlink",
                            "sha256": hashlib.sha256(b).hexdigest(),
                            "size_in_bytes": len(b)})
          json.dump({"paths_version": 1, "paths": paths}, open(root + "/info/paths.json", "w"))
          open(root + "/info/files", "w").write("".join(r + "\n" for r in rels))
          with tarfile.open("warmhookprobe-0.0.1-0.tar.bz2", "w:bz2") as t:
              for d, _, files in os.walk(root):
                  for fn in files:
                      full = os.path.join(d, fn)
                      t.add(full, arcname=os.path.relpath(full, root))
          print("built warmhookprobe-0.0.1-0.tar.bz2")
          PY

      - name: "H: cold env q with isabelle, then install the warm-up-first clone"
        shell: bash -l {0}
        run: |
          set -uo pipefail
          conda create -y -n q -c https://conda.qiyuan.me --override-channels isabelle 2>&1 | tail -3
          conda install -y -n q ./warmhookprobe-0.0.1-0.tar.bz2 2>&1 | tail -5
          echo "PREFIX_Q=$CONDA\\envs\\q" >> "$GITHUB_ENV"

      - name: "H verdict: did the warm-up make the registration work?"
        shell: cmd
        run: |
          echo ================ warmlog.txt ================
          if exist "%PREFIX_Q%\warmlog.txt" (type "%PREFIX_Q%\warmlog.txt") else (echo ^(no log^))
          echo =============================================
          set "ISAU="
          for /f "delims=" %%d in ('call "%PREFIX_Q%\isa\bin\isabelle.bat" getenv -b ISABELLE_HOME_USER 2^>nul') do set "ISAU=%%d"
          set "P=%ISAU:/cygdrive/=%"
          set "DL2=%P:~0,1%"
          set "REST2=%P:~1%"
          set "CFQ=%DL2%:%REST2%"
          set "CFQ=%CFQ:/=\%"
          set "CFQ=%CFQ%\etc\components"
          if exist "%CFQ%" (type "%CFQ%") else (echo ^(no components file^))
          findstr /C:"isabelle-performant-ml" "%CFQ%" >nul 2>&1 && (echo H PASS: a throwaway isabelle call BEFORE components -u fixes it) || (echo H FAIL: warm-up did not help)
          exit /b 0
