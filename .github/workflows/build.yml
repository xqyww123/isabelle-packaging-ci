name: build

# Reusable workflow: builds the *patched* Isabelle distribution.
#
# Job A   — ubuntu-latest: source -> patches -> hg commit -> Admin/init
#           -> Admin/build_release  -> all 4 platform bundles (NO heaps).
#           The Windows .exe is cross-built here on Linux (launch4j/7zz are
#           unix-only; see PACKAGING_DESIGN.md §5.0).
# Job B-E — per-platform NATIVE heap builds (heaps cannot be cross-built).
# Job F   — ubuntu-latest: inject each platform's heaps into that platform's bundle
#           and turn the result into a conda package (one per conda subdir).
#           It VERIFIES by installing from a local channel; it does NOT publish.
#           Publishing to R2 lives in release.yml, so that a push can never move
#           the channel (PACKAGING_DESIGN.md §5.4).
#
# ---------------------------------------------------------------------------
# Two things that cost a lot of CI time to discover -- read before editing.
# ---------------------------------------------------------------------------
#
# (1) TeX.  build_release ALWAYS runs `isabelle build_doc -a`; there is no flag to
#     skip it, so the runner needs a fairly complete TeX Live.  The final,
#     empirically-minimal list is in the "Install build deps" step below.  Beyond
#     the set named in PACKAGING_DESIGN.md §7, a bare GitHub runner additionally
#     needs:
#       texlive-font-utils + ghostscript  -> `epstopdf` (13 documents die without it)
#       cm-super + texlive-fonts-extra    -> scalable Type-1 fonts, else microtype
#                                            in Demo_LIPIcs aborts with
#                                            "auto expansion is only possible with
#                                             scalable fonts"
#     The step ends with explicit kpsewhich/`command -v` assertions: if TeX is
#     incomplete we want to fail in 30s, not 25 minutes into build_doc.
#
# (2) Version detection / the `isabelle` shim.  my-better-isabelle-prover picks its
#     patch set by parsing `isabelle version`.  In a bare hg checkout that is
#     useless: etc/ISABELLE_IDENTIFIER does not exist yet (lib/scripts/getsettings
#     only fills it in at release time), so `isabelle version` does NOT print
#     "Isabelle2025-2" and the tool bails out with "no patches available".
#     Work-around (step 3): hand the tool a 5-line shim that answers the only two
#     questions it asks -- `version` and `getenv -b ISABELLE_HOME` -- and forwards
#     everything else to the real binary.  We deliberately do NOT edit the pristine
#     source tree: build_release rewrites those files itself later.
#
# Related gotcha (do not "fix" this): `isabelle getenv ML_IDENTIFIER` prints an
# EMPTY value in Isabelle2025-2 -- ML_IDENTIFIER is not a settings variable at all,
# it is computed Scala-side (Pure/ML/ml_settings.scala: ml_system + "_" + ml_platform).
# Jobs B-E therefore read the heap directory name off `ls heaps/` instead.

on:
  workflow_call:
    inputs:
      release:
        description: "Isabelle release name (= hg tag)"
        type: string
        default: Isabelle2025-2
      platforms:
        description: "platform families for build_release"
        type: string
        default: linux,linux_arm,windows,macos
      min_free_gb:
        description: "abort-free disk threshold on / (GB); below this we run cleanup"
        type: number
        default: 60
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: >-
          Claude subscription token (`claude setup-token`) for Job F's GUI check.
          Optional: without it the screenshot is still taken and uploaded, and only
          the AI judgement is skipped.  A reusable workflow gets NO secrets unless
          they are declared here AND passed by the caller (`secrets: inherit`).
          NB deliberately not ANTHROPIC_API_KEY -- that outranks the OAuth token in
          Claude Code's auth chain and would bill the metered API instead of the
          subscription.
        required: false

jobs:
  bundles:
    name: "Job A - bundles (all platforms, no heaps)"
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      RELEASE: ${{ inputs.release }}
      PLATFORMS: ${{ inputs.platforms }}
      ISA_SRC: ${{ github.workspace }}/isabelle-src
      OUT: ${{ github.workspace }}/out
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4
        with:
          path: ci

      - name: Disk assertion (+ cleanup only if needed)
        run: |
          set -euo pipefail
          df -h /
          avail=$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
          echo "free on / = ${avail} GB (threshold ${{ inputs.min_free_gb }} GB)"
          if [ "$avail" -lt "${{ inputs.min_free_gb }}" ]; then
            echo "::warning::free disk below threshold - running cleanup"
            t0=$(date +%s)
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                        /usr/local/.ghcup /usr/local/share/powershell \
                        /usr/share/swift /usr/local/share/chromium \
                        /opt/hostedtoolcache/CodeQL || true
            echo "cleanup took $(( $(date +%s) - t0 ))s"
            df -h /
            avail=$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
            [ "$avail" -ge 40 ] || { echo "::error::still only ${avail} GB free"; exit 1; }
          else
            echo "plenty of space - no cleanup needed"
          fi
          # NOTE: /tmp is on the 145G ext4 root disk (not tmpfs) on GitHub runners
          # => ISABELLE_TMP_PREFIX needs NO override here.  (PACKAGING_DESIGN.md §5.3)
          echo "--- /tmp filesystem ---"; df -hT /tmp

      - name: Install build deps (mercurial, patch, TeX Live)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            mercurial patch curl unzip \
            texlive-latex-recommended texlive-latex-extra texlive-science \
            texlive-plain-generic texlive-fonts-recommended latexmk \
            texlive-font-utils texlive-fonts-extra texlive-publishers \
            texlive-pictures texlive-bibtex-extra cm-super ghostscript
          # ^ beyond the list in PACKAGING_DESIGN.md §7, a bare runner also needs:
          #   texlive-font-utils + ghostscript -> `epstopdf` (13 docs die without it)
          #   cm-super / texlive-fonts-extra   -> scalable T1 fonts, else microtype in
          #                                       Demo_LIPIcs dies with
          #                                       "auto expansion is only possible with
          #                                        scalable fonts"
          hg --version | head -1
          patch --version | head -1
          latexmk --version | head -1
          echo "epstopdf: $(command -v epstopdf || echo MISSING)"
          command -v epstopdf >/dev/null
          kpsewhich stmaryrd.sty
          for f in microtype.sty libertine.sty type1cm.sty; do
            echo "$f -> $(kpsewhich $f || echo '(not found)')"
          done
          java -version 2>&1 | head -1

      - name: Restore cached hg clone
        id: hgcache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/isabelle-src
          key: hg-isabelle-v1

      - name: "(1) hg clone Isabelle"
        if: steps.hgcache.outputs.cache-hit != 'true'
        run: |
          set -uo pipefail
          # Source order matters:
          #   isabelle.sketis.net = Makarius' official mirror -- the ONLY one that
          #     currently answers.  (It is also where build_release pulls the native
          #     components from, so the runner must reach it anyway.)
          #   isabelle.in.tum.de  = the canonical repo, but as of 2026-07-12 it RSTs
          #     every TLS connection (from GitHub runners AND from a normal desktop:
          #     "curl: (35) Recv failure: Connection reset by peer").  Kept as fallback.
          for url in https://isabelle.sketis.net/repos/isabelle \
                     https://isabelle.in.tum.de/repos/isabelle; do
            echo "### probing $url"
            curl -sS -o /dev/null -w '    capabilities: HTTP %{http_code} in %{time_total}s\n' \
              "$url?cmd=capabilities" || echo "    curl rc=$?"
          done

          ok=0
          for url in https://isabelle.sketis.net/repos/isabelle \
                     https://isabelle.in.tum.de/repos/isabelle; do
            for flags in --stream ""; do
              for attempt in 1 2 3; do
                echo "=== clone $url ${flags:-<plain>} attempt $attempt ==="
                rm -rf "$ISA_SRC"
                if hg clone $flags "$url" "$ISA_SRC"; then ok=1; break 3; fi
                echo "::warning::failed: $url ${flags:-<plain>} attempt $attempt"
                sleep 15
              done
            done
          done
          [ "$ok" -eq 1 ] || { echo "::error::cannot clone the Isabelle repository"; exit 1; }
          echo "Isabelle2025-2 resolves to: $(hg -R "$ISA_SRC" id -r "$RELEASE")"
          du -sh "$ISA_SRC/.hg"

      - name: Save hg clone to cache
        if: steps.hgcache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/isabelle-src
          key: hg-isabelle-v1

      - name: "(2) hg update -r $RELEASE"
        working-directory: ${{ env.ISA_SRC }}
        run: |
          set -euo pipefail
          hg update -r "$RELEASE"
          echo "upstream rev = $(hg id -i)"
          echo "UPSTREAM_REV=$(hg id -i)" >> "$GITHUB_ENV"

      - name: "(3) Apply my-better-isabelle-prover patches"
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/venv"
          # ---- install from GIT, not PyPI -------------------------------------
          # PyPI is stuck at 0.2.0, which has NEITHER --category NOR expose_foreign
          # (one of the three `user` features).  Git HEAD is 0.3.0: it ships
          # patches/categories.toml and `patch --category {user,dev,all}`.
          "$RUNNER_TEMP/venv/bin/pip" install --quiet "git+https://github.com/xqyww123/my_better_isabelle_prover"
          "$RUNNER_TEMP/venv/bin/pip" show my-better-isabelle-prover | sed -n '1,2p'
          MBI="$RUNNER_TEMP/venv/bin/my-better-isabelle"

          # --- why a shim -------------------------------------------------------
          # The patch tool keys its patch set off `isabelle version`.  A bare hg
          # checkout has an EMPTY ISABELLE_IDENTIFIER (lib/scripts/getsettings fills
          # it in only at release time), so `isabelle version` does NOT print
          # "Isabelle2025-2" and the tool would bail out with "no patches available".
          # Rather than mutate the pristine source tree (which build_release later
          # rewrites anyway), we hand the tool a 5-line shim that answers exactly the
          # two questions it asks -- `version` and `getenv -b ISABELLE_HOME` -- and
          # forwards anything else to the real binary.  Tool stays a black box.
          mkdir -p "$RUNNER_TEMP/shim"
          cat > "$RUNNER_TEMP/shim/isabelle" <<EOF
          #!/usr/bin/env bash
          case "\$1" in
            version) echo "$RELEASE" ;;
            getenv)  echo "$ISA_SRC" ;;
            *) exec "$ISA_SRC/bin/isabelle" "\$@" ;;
          esac
          EOF
          chmod +x "$RUNNER_TEMP/shim/isabelle"

          # ---- USER category ---------------------------------------------------
          # The released Isabelle carries the `user` features; the `dev` ones (needed
          # only by Isa-REPL / Isa-Mini) stay out -- Isa-REPL's own package applies
          # register_thy in its installer.
          #
          # WHAT is in `user` is the patch tool maintainer's call, not CI's.  So we
          # pass --category user and take whatever that yields.  Nothing below names
          # a single feature: feature names are LOGGED for traceability, never
          # asserted, so a future re-categorisation cannot turn this red on its own.
          # --no-build: scala_build happens inside build_release stage 1 anyway.
          "$MBI" --isabelle-bin "$RUNNER_TEMP/shim/isabelle" patch --category user --no-build

          echo "--- what actually got applied (log only, NOT an assertion) ---"
          "$MBI" --isabelle-bin "$RUNNER_TEMP/shim/isabelle" status --category all || true

      - name: "(3b) Verify the patches landed in the source tree"
        working-directory: ${{ env.ISA_SRC }}
        run: |
          set -euo pipefail
          MBI="$RUNNER_TEMP/venv/bin/my-better-isabelle"
          SHIM="$RUNNER_TEMP/shim/isabelle"

          # (i) the tool's OWN verdict: `status --category user` exits nonzero unless
          #     every user patch is applied.  This is the real assertion.
          echo "===== tool verdict: status --category user ====="
          "$MBI" --isabelle-bin "$SHIM" status --category user
          echo "  -> tool reports all user patches applied (exit 0)"

          # (ii) cross-check against the repository itself: the files hg sees modified
          #      must be exactly the target files of the applied patches.  Both sides
          #      are DERIVED at run time -- no feature name is hard-coded here.
          echo
          echo "===== hg-modified files vs the tool's applied targets ====="
          "$MBI" --isabelle-bin "$SHIM" status --category all > "$RUNNER_TEMP/status.txt" || true
          grep -E '\[ *applied\]' "$RUNNER_TEMP/status.txt" \
            | sed -E 's/.*\(([^)]*)\).*/\1/' | sort -u > "$RUNNER_TEMP/applied_targets.txt"
          hg status -m | sed -E 's/^M +//' | sort -u > "$RUNNER_TEMP/hg_modified.txt"
          echo "--- applied patch targets ---"; cat "$RUNNER_TEMP/applied_targets.txt"
          echo "--- hg modified ---";           cat "$RUNNER_TEMP/hg_modified.txt"
          if ! diff -u "$RUNNER_TEMP/applied_targets.txt" "$RUNNER_TEMP/hg_modified.txt"; then
            echo "::error::the patched files and the hg-modified files disagree"
            exit 1
          fi
          [ -s "$RUNNER_TEMP/hg_modified.txt" ] || { echo "::error::no file was modified at all"; exit 1; }
          echo "  -> agree ($(wc -l < "$RUNNER_TEMP/hg_modified.txt") file(s) patched)"

          # hand the list to step (8), which re-checks these very files inside the bundle
          cp "$RUNNER_TEMP/hg_modified.txt" "$RUNNER_TEMP/patched_files.txt"

      - name: "(4) hg commit the patches  <-- without this, build_release drops them"
        working-directory: ${{ env.ISA_SRC }}
        run: |
          set -euo pipefail
          hg addremove -S
          hg commit -u ci -m "our patches (my-better-isabelle-prover)"
          REV=$(hg id -i)
          echo "patched rev = $REV  (parent = $UPSTREAM_REV)"
          echo "PATCHED_REV=$REV" >> "$GITHUB_ENV"
          hg log -r . --template '{node|short} {desc}\n{parents}\n'

      - name: "(5) Bootstrap: Admin/init"
        working-directory: ${{ env.ISA_SRC }}
        run: |
          set -euo pipefail
          # Admin/init = `bin/isabelle components -I` -> `components -a` -> scala_build.
          # NOTE: running `components -a` alone is a no-op; the -I must come first.
          ./Admin/init
          ./bin/isabelle version
          ./bin/isabelle getenv ISABELLE_HOME ML_IDENTIFIER

      - name: "(6) Admin/build_release  (all platforms, NO -b => no heaps)"
        working-directory: ${{ env.ISA_SRC }}
        run: |
          set -euo pipefail
          mkdir -p "$OUT"
          # NO -b !  Heaps cannot be cross-built (PACKAGING_DESIGN.md §5.0 rule 2);
          # they are produced natively per platform in Jobs B-E (next round).
          set +e
          ./Admin/build_release -D "$OUT" -r "$PATCHED_REV" -R "$RELEASE" -p "$PLATFORMS"
          rc=$?
          set -e
          echo "BUILD_RELEASE_EXIT=$rc"
          df -h /
          exit $rc

      - name: "(7) Products"
        run: |
          set -euo pipefail
          find "$OUT" -maxdepth 2 -mindepth 1 | sort
          echo "--- dist dir ---"
          ls -l "$OUT/dist-$RELEASE"
          echo "--- sizes ---"
          du -h "$OUT/dist-$RELEASE"/* | sort -h

      - name: "(8) Verify: ISABELLE_ID, patched isabelle.jar, Windows .exe"
        run: |
          set -euo pipefail
          DIST="$OUT/dist-$RELEASE"
          fail=0

          echo "===== every bundle present and of a plausible size ====="
          # generic source archive: no native components -> tens of MB.
          # platform bundles: full contrib for that platform -> hundreds of MB.
          for spec in "$RELEASE.tar.gz:20000000" \
                      "${RELEASE}_linux.tar.gz:400000000" \
                      "${RELEASE}_linux_arm.tar.gz:400000000" \
                      "${RELEASE}_macos.tar.gz:400000000" \
                      "$RELEASE.exe:400000000"; do
            f=${spec%:*}; min=${spec##*:}
            if [ -f "$DIST/$f" ]; then
              sz=$(stat -c %s "$DIST/$f")
              printf '  OK    %-32s %6s (%s bytes, min %s)\n' \
                "$f" "$(du -h "$DIST/$f" | cut -f1)" "$sz" "$min"
              [ "$sz" -gt "$min" ] || { echo "::error::$f suspiciously small"; fail=1; }
            else
              echo "::error::MISSING $f"; fail=1
            fi
          done

          echo "===== the .exe is a real PE binary (cross-built on Linux!) ====="
          file "$DIST/$RELEASE.exe"

          echo "===== unpack the linux bundle ====="
          mkdir -p "$RUNNER_TEMP/verify"
          tar xzf "$DIST/${RELEASE}_linux.tar.gz" -C "$RUNNER_TEMP/verify"
          ISA="$RUNNER_TEMP/verify/$RELEASE"

          echo "--- etc/ISABELLE_ID must equal our patch commit $PATCHED_REV ---"
          got=$(cat "$ISA/etc/ISABELLE_ID")
          echo "etc/ISABELLE_ID = $got"
          [ "$got" = "$PATCHED_REV" ] || { echo "::error::ISABELLE_ID != $PATCHED_REV"; fail=1; }
          echo "bin/isabelle version -> $("$ISA/bin/isabelle" version || true)"

          echo "--- the patched files must have SHIPPED, byte for byte ---"
          # Generic on purpose: the file list comes from step (3b) (= whatever
          # --category user actually patched).  Comparing sha256 against the patched
          # source tree is strictly stronger than grepping for feature markers, and it
          # cannot go stale when the tool re-categorises a feature.
          while read -r f; do
            [ -n "$f" ] || continue
            a=$(sha256sum "$ISA_SRC/$f" | cut -d' ' -f1)
            b=$(sha256sum "$ISA/$f"     | cut -d' ' -f1)
            if [ "$a" = "$b" ]; then
              echo "  OK    $f  (${a:0:12})"
            else
              echo "::error::$f in the bundle differs from the patched source!"
              echo "        patched src: $a"
              echo "        bundle     : $b"
              fail=1
            fi
          done < "$RUNNER_TEMP/patched_files.txt"

          echo "--- lib/classes/isabelle.jar was rebuilt from the patched source ---"
          # build_release runs scala_build itself, from the tree we patched, so the jar
          # is by construction compiled from the shipped (patched) .scala files that the
          # sha256 check above just verified.  Assert only that the jar is really there
          # and non-trivial -- naming Scala symbols of a specific feature would go stale
          # the moment that feature is re-categorised or retired.
          ls -l "$ISA/lib/classes/isabelle.jar"
          jar_sz=$(stat -c %s "$ISA/lib/classes/isabelle.jar")
          [ "$jar_sz" -gt 1000000 ] || { echo "::error::isabelle.jar suspiciously small ($jar_sz)"; fail=1; }
          scala_patched=$(grep -c '\.scala$' "$RUNNER_TEMP/patched_files.txt" || true)
          echo "  patched .scala files this run: $scala_patched (all compiled into the jar above)"

          echo "--- no heaps in this bundle (expected: heaps built natively in Jobs B-E) ---"
          ls -R "$ISA/heaps" 2>/dev/null | head -20 || echo "  (no heaps/ dir)"

          rm -rf "$RUNNER_TEMP/verify"
          exit $fail

      # One artifact PER BUNDLE (not one 5.8 GB blob): Jobs B-E each need exactly
      # one of them, and actions/download-artifact cannot fetch a single file out
      # of a larger artifact.
      - name: Upload bundle (generic source archive)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-src
          path: ${{ github.workspace }}/out/dist-${{ inputs.release }}/${{ inputs.release }}.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload bundle (linux)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-bundle-linux
          path: ${{ github.workspace }}/out/dist-${{ inputs.release }}/${{ inputs.release }}_linux.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload bundle (linux_arm)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-bundle-linux_arm
          path: ${{ github.workspace }}/out/dist-${{ inputs.release }}/${{ inputs.release }}_linux_arm.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload bundle (macos)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-bundle-macos
          path: ${{ github.workspace }}/out/dist-${{ inputs.release }}/${{ inputs.release }}_macos.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload bundle (windows .exe)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-bundle-windows
          path: ${{ github.workspace }}/out/dist-${{ inputs.release }}/${{ inputs.release }}.exe
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  # ===========================================================================
  # Jobs B-E: NATIVE heap builds.  One per platform -- heaps cannot be
  # cross-built (PACKAGING_DESIGN.md §3.5 / §5.0 rule 2).
  #
  # !! They consume Job A's PLATFORM BUNDLES, not the generic source archive. !!
  # The generic archive cannot build heaps at all, and `isabelle components -a`
  # cannot fix that.  Proof, from the 2025-2 sources:
  #   * build_release purges Admin/ from the archive (build_release.scala:540), so
  #     the catalog `Admin/components/main` that `components -I` wires into the user
  #     settings does not exist -> getfunctions:293 "Bad component catalog file" -> exit 2.
  #   * The bundled components are recorded in the archive's etc/components only as
  #     COMMENTS (`#bundled:polyml-...`, record_bundled_components, build_release.scala:180),
  #     and getfunctions:302 skips every line starting with '#'.  So
  #     ISABELLE_COMPONENTS_MISSING is EMPTY and `components -a` (lib/Tools/components,
  #     which resolves exactly $ISABELLE_COMPONENTS_MISSING) is a silent no-op.
  #   * Turning those comments into real `contrib/...` entries is `activate_components`
  #     (build_release.scala:200), which runs only in the per-platform bundle stage.
  #   => the generic archive has NO Poly/ML and NO JDK; `isabelle build` cannot even start.
  # The platform bundles, by contrast, already carry a fully activated contrib/ for
  # their platform -- they are exactly what a user downloads.  So: unpack, build.
  #
  # The build command is copied verbatim from what build_release itself runs on its
  # build_host (build_release.scala:245-258), including `-o parallel_proofs=0`:
  #     bin/isabelle build -o parallel_proofs=0 -o system_heaps -b -- HOL Main
  # `Main` is a real session (src/Doc/ROOT:310, `session Main (doc) in "Main" = HOL +`)
  # and the default session of our toolchain; a heap is a delta over its parent, so
  # Main costs a few MB on top of HOL.
  # ===========================================================================

  heaps-linux:
    name: "Job ${{ matrix.id }} - heaps ${{ matrix.bundle }} (${{ matrix.runner }})"
    needs: bundles
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: B
            runner: ubuntu-latest
            bundle: linux
          - id: C
            runner: ubuntu-24.04-arm
            bundle: linux_arm
    env:
      RELEASE: ${{ inputs.release }}
    steps:
      - name: Download the ${{ matrix.bundle }} bundle from Job A
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.release }}-bundle-${{ matrix.bundle }}
          path: ${{ runner.temp }}/dl

      - name: Unpack
        run: |
          set -euo pipefail
          # /tmp lives on the 145 GB ext4 root disk on GitHub Linux runners (not tmpfs)
          # => ISABELLE_TMP_PREFIX needs NO override.  (PACKAGING_DESIGN.md §5.3)
          df -hT / /tmp
          mkdir -p "$HOME/isa"
          tar xzf "$RUNNER_TEMP/dl/${RELEASE}_${{ matrix.bundle }}.tar.gz" -C "$HOME/isa"
          ISA="$HOME/isa/$RELEASE"
          echo "ISA=$ISA" >> "$GITHUB_ENV"
          "$ISA/bin/isabelle" version
          "$ISA/bin/isabelle" getenv -b ISABELLE_PLATFORM64 ML_SYSTEM
          echo "--- ISABELLE_ID (must be our patched rev) ---"
          cat "$ISA/etc/ISABELLE_ID"
          echo "--- heaps/ must be EMPTY at this point ---"
          ls -R "$ISA/heaps" 2>/dev/null || echo "  (no heaps/ dir - as expected)"

      - name: "Build heaps: HOL, Main"
        working-directory: ${{ env.ISA }}
        run: |
          set -euo pipefail
          nproc; free -g || true
          t0=$(date +%s)
          bin/isabelle build -o parallel_proofs=0 -o system_heaps -b -- HOL Main
          echo "heap build took $(( ($(date +%s) - t0) / 60 )) min"
          df -h /

      - name: Verify heaps
        working-directory: ${{ env.ISA }}
        run: |
          set -euo pipefail
          n=$(ls heaps | wc -l)
          [ "$n" -eq 1 ] || { echo "::error::expected exactly 1 ML_IDENTIFIER dir, got $n"; ls heaps; exit 1; }
          id=$(ls heaps)
          echo "ML_IDENTIFIER = $id"
          for s in Pure HOL Main; do
            f="heaps/$id/$s"
            [ -f "$f" ] || { echo "::error::missing heap $id/$s"; exit 1; }
            printf '  %-5s %10s bytes  sha256=%s\n' "$s" "$(wc -c < "$f")" "$(sha256sum "$f" | cut -c1-16)"
            # !! heaps/<ML_ID>/log/<S>.db must SURVIVE into the artifact. !!
            # It is the session database, not a log.  `isabelle build` decides that a
            # session is finished-and-current by looking it up there -- NOT by the heap
            # file existing.  An earlier revision of this job did `rm -rf heaps/*/log`
            # here; the resulting conda package installed fine and `isabelle version`
            # worked, but the first real build printed "Building HOL ..." and recompiled
            # HOL from scratch, making the shipped heap useless.  The official Isabelle
            # bundle ships these very files, which is why it does not rebuild HOL.
            [ -f "heaps/$id/log/$s.db" ] || { echo "::error::missing session db $id/log/$s.db"; exit 1; }
          done
          [ "$(wc -c < "heaps/$id/HOL")" -gt 100000000 ] || { echo "::error::HOL heap suspiciously small"; exit 1; }
          echo "--- session databases (these MUST ship) ---"
          ls -l "heaps/$id/log/"

      - name: Upload heaps
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-heaps-${{ matrix.bundle }}
          path: ${{ env.ISA }}/heaps
          if-no-files-found: error
          retention-days: 7

  heaps-macos:
    name: "Job D - heaps macos x2 (macos-14)"
    needs: bundles
    runs-on: macos-14
    timeout-minutes: 330
    env:
      RELEASE: ${{ inputs.release }}
    steps:
      - name: Free up disk (drop the extra Xcodes)
        run: |
          set -euo pipefail
          df -h /
          t0=$(date +%s)
          # ~42 GB in ~90s.  Without this the runner has only ~40 GB free, which is
          # not enough for the bundle + two full heap trees.  (PACKAGING_DESIGN.md §5.2)
          sudo rm -rf /Applications/Xcode_*.app || true
          echo "cleanup took $(( $(date +%s) - t0 ))s"
          df -h /

      - name: Download the macos bundle from Job A
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.release }}-bundle-macos
          path: ${{ runner.temp }}/dl

      - name: Unpack
        run: |
          set -euo pipefail
          mkdir -p "$HOME/isa"
          tar xzf "$RUNNER_TEMP/dl/${RELEASE}_macos.tar.gz" -C "$HOME/isa"
          # The macOS bundle IS an app bundle: build_release renames the whole tree to
          # <name>.app (build_release.scala:722), so ISABELLE_HOME == .../Isabelle2025-2.app
          ISA="$HOME/isa/$RELEASE.app"
          [ -d "$ISA" ] || { echo "::error::expected $ISA"; ls -l "$HOME/isa"; exit 1; }
          echo "ISA=$ISA" >> "$GITHUB_ENV"
          "$ISA/bin/isabelle" version
          cat "$ISA/etc/ISABELLE_ID"
          echo "--- Rosetta (needed for the x86_64 pass) ---"
          arch -x86_64 /usr/bin/true && echo "  Rosetta OK" || echo "::warning::Rosetta not usable"

      - name: "Build heaps x2: ML_system_apple = false, then true"
        working-directory: ${{ env.ISA }}
        run: |
          set -euo pipefail
          sysctl -n hw.ncpu; df -h /
          # `isabelle getenv -o` does NOT exist.  The only way to switch ML_system_apple
          # is the preferences file -- exactly what build_release does on its build_host
          # (build_release.scala:248).  It must be a *preference*, not `build -o`, because
          # the heap directory name is derived from ML_PLATFORM at settings-init time.
          HOME_USER="$(bin/isabelle getenv -b ISABELLE_HOME_USER)"
          mkdir -p "$HOME_USER/etc"
          for apple in false true; do
            echo "===================== ML_system_apple = $apple ====================="
            echo "ML_system_apple = $apple" > "$HOME_USER/etc/preferences"
            t0=$(date +%s)
            bin/isabelle build -o parallel_proofs=0 -o system_heaps -b -- HOL Main
            echo "--- pass ML_system_apple=$apple took $(( ($(date +%s) - t0) / 60 )) min"
            ls heaps
            df -h /
          done

      - name: Verify heaps (two ML_IDENTIFIERs)
        working-directory: ${{ env.ISA }}
        run: |
          set -euo pipefail
          # Do NOT delete heaps/*/log -- log/<S>.db is the session database that makes
          # `isabelle build` treat the session as already built.  See the long note in
          # Job B/C's verify step.
          n=$(ls heaps | wc -l | tr -d ' ')
          [ "$n" -eq 2 ] || { echo "::error::expected 2 ML_IDENTIFIER dirs (x86_64 + arm64), got $n"; ls heaps; exit 1; }
          for id in $(ls heaps); do
            echo "ML_IDENTIFIER = $id"
            for s in Pure HOL Main; do
              f="heaps/$id/$s"
              [ -f "$f" ] || { echo "::error::missing heap $id/$s"; exit 1; }
              printf '  %-5s %10s bytes  sha256=%s\n' "$s" "$(wc -c < "$f")" "$(shasum -a 256 "$f" | cut -c1-16)"
              [ -f "heaps/$id/log/$s.db" ] || { echo "::error::missing session db $id/log/$s.db"; exit 1; }
            done
            [ "$(wc -c < "heaps/$id/HOL")" -gt 100000000 ] || { echo "::error::HOL heap suspiciously small"; exit 1; }
            ls -l "heaps/$id/log/"
          done
          # the two HOL heaps must really differ (different ML platform)
          a=$(ls heaps | sed -n 1p); b=$(ls heaps | sed -n 2p)
          [ "$(shasum -a 256 "heaps/$a/HOL" | cut -d' ' -f1)" != "$(shasum -a 256 "heaps/$b/HOL" | cut -d' ' -f1)" ] \
            || { echo "::error::the two HOL heaps are identical - the apple/non-apple switch did not take"; exit 1; }

      - name: Upload heaps
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-heaps-macos
          path: ${{ env.ISA }}/heaps
          if-no-files-found: error
          retention-days: 7

  heaps-windows:
    name: "Job E - heaps windows (windows-latest)"
    needs: bundles
    runs-on: windows-latest
    timeout-minutes: 240
    defaults:
      run:
        shell: bash          # Git-bash; the Isabelle build itself runs under CYGWIN bash
    env:
      RELEASE: ${{ inputs.release }}
    steps:
      # ---------------------------------------------------------------------
      # Disk: C: has ~33 GB free, D: has ~147 GB.  Everything (tree, temp, HOME)
      # goes on D:.
      #
      # !! Exporting TMPDIR/TEMP/TMP is NOT enough. !!  Under Cygwin,
      # lib/scripts/getsettings:30 OVERWRITES them unconditionally:
      #     TMPDIR="$(cygpath -u "$LOCALAPPDATA")/Temp"
      # and etc/settings:90 then derives ISABELLE_TMP_PREFIX="$TMPDIR/isabelle".
      # So the only lever that actually moves Isabelle's scratch space off C: is
      # LOCALAPPDATA.  (TMPDIR/TEMP/TMP are still set below, for the non-Cygwin
      # side: 7-Zip, the JVM, and the actions/* JS actions.)
      # ---------------------------------------------------------------------
      - name: "Disk survey + move ALL temp/scratch off the small C: drive"
        run: |
          set -euo pipefail
          df -h | grep -Ei '^(Filesystem|[CD]:)' || df -h
          echo "RUNNER_TEMP=$RUNNER_TEMP   LOCALAPPDATA=${LOCALAPPDATA:-}"
          mkdir -p /d/localapp/Temp /d/home /d/isa
          {
            echo "LOCALAPPDATA=D:\\localapp"   # -> Cygwin TMPDIR=/cygdrive/d/localapp/Temp
            echo "TMPDIR=$RUNNER_TEMP"
            echo "TEMP=$RUNNER_TEMP"
            echo "TMP=$RUNNER_TEMP"
          } >> "$GITHUB_ENV"

      - name: Download the windows .exe from Job A
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.release }}-bundle-windows
          path: ${{ runner.temp }}/dl

      - name: Unpack the self-extracting .exe with 7-Zip
        run: |
          set -euo pipefail
          # The .exe is a 7z SFX: sfx module + config + a 7z archive of the whole
          # Isabelle tree (build_release.scala:820-841).  7-Zip (preinstalled on the
          # runner) extracts it directly.
          SEVENZ=7z
          command -v "$SEVENZ" >/dev/null || SEVENZ="/c/Program Files/7-Zip/7z.exe"
          "$SEVENZ" x -y "-oD:\\isa" "$RUNNER_TEMP\\dl\\$RELEASE.exe" > /d/7z.log || { tail -40 /d/7z.log; exit 1; }
          tail -3 /d/7z.log
          [ -d "/d/isa/$RELEASE" ] || { echo "::error::7z did not produce D:\\isa\\$RELEASE"; ls /d/isa; exit 1; }
          du -sh "/d/isa/$RELEASE"
          # Windows-style paths, built by string concatenation: git-bash's cygpath is
          # NOT the Cygwin we are targeting, so do not rely on it here.
          echo "ISA_WIN=D:\\isa\\$RELEASE"        >> "$GITHUB_ENV"
          echo "ISA_CYG=/cygdrive/d/isa/$RELEASE" >> "$GITHUB_ENV"

      - name: Initialize Cygwin (recover symlinks, rebaseall, postinstall)
        run: |
          set -euo pipefail
          # A raw 7z extraction leaves the tree marked
          # contrib/cygwin/isabelle/uninitialized: build_release STRIPS every symlink
          # and records them in contrib/cygwin/isabelle/symlinks (build_release.scala:808-818).
          # Environment.cygwin_init() -- whose own comment reads "init (e.g. after
          # extraction via 7zip)" (Tools/Setup/src/Environment.java:303) -- recovers the
          # symlinks and runs rebaseall + postinstall.  It fires from Environment.init(),
          # which any isabelle_setup entry point triggers; the jar's Main-Class is
          # isabelle.setup.Setup, and its `classpath` op is the cheapest one.
          #
          # The classpath must be  SCALA_INTERFACES : ISABELLE_SETUP_JAR  -- exactly what
          # Isabelle itself passes (lib/scripts/getsettings:118).  `-jar setup.jar` alone
          # dies with  NoClassDefFoundError: dotty/tools/dotc/interfaces/SimpleReporter,
          # because Build.classpath() touches the Scala compiler interfaces, which live in
          # contrib/scala-*/lib/scala3-interfaces-*.jar.
          JDK=$(basename "$(ls -d /d/isa/$RELEASE/contrib/jdk-*)")
          JAVA="/d/isa/$RELEASE/contrib/$JDK/x86_64-windows/bin/java.exe"
          JAR="$(ls /d/isa/$RELEASE/contrib/isabelle_setup-*/lib/isabelle_setup.jar)"
          IFACE="$(ls /d/isa/$RELEASE/contrib/scala-*/lib/scala3-interfaces-*.jar)"
          # /d/isa/<rel>/x/y  ->  D:\isa\<rel>\x\y   (git-bash cygpath targets MSYS, not this Cygwin)
          tw() { local rel="${1#/d/isa/$RELEASE/}"; echo "$ISA_WIN\\${rel//\//\\}"; }
          CP="$(tw "$IFACE");$(tw "$JAR")"
          echo "java      = $JAVA"
          echo "classpath = $CP"
          ls -l "/d/isa/$RELEASE/contrib/cygwin/isabelle/uninitialized"
          MSYS2_ARG_CONV_EXCL='*' \
          "$JAVA" "-Disabelle.root=$ISA_WIN" "-Dcygwin.root=$ISA_WIN\\contrib\\cygwin" \
                  -classpath "$CP" isabelle.setup.Setup classpath | head -2
          if [ -f "/d/isa/$RELEASE/contrib/cygwin/isabelle/uninitialized" ]; then
            echo "::error::cygwin_init did not run (the 'uninitialized' marker is still there)"
            exit 1
          fi
          echo "Cygwin initialized: marker gone, symlinks recovered."

      - name: "Build heaps: HOL, Main  (under Cygwin bash)"
        run: |
          set -euo pipefail
          BASH_CYG="/d/isa/$RELEASE/contrib/cygwin/bin/bash.exe"
          # Isabelle itself always shells out as `<cygwin>\bin\bash.exe -c ...`
          # (Pure/System/bash.scala:74); we do the same.  HOME/USER_HOME must be given
          # as *Cygwin* paths -- otherwise getsettings derives USER_HOME from
          # $USERPROFILE and puts ISABELLE_HOME_USER on C:.
          PRE='export PATH=/usr/bin:/bin:$PATH; export HOME=/cygdrive/d/home; export USER_HOME=$HOME;'
          "$BASH_CYG" -c "$PRE"' cd '"$ISA_CYG"' && bin/isabelle version && bin/isabelle getenv -b ML_SYSTEM ISABELLE_HOME_USER ISABELLE_TMP_PREFIX'
          # assert the scratch space really is on D: (see the LOCALAPPDATA note above)
          tmp=$("$BASH_CYG" -c "$PRE"' cd '"$ISA_CYG"' && bin/isabelle getenv -b ISABELLE_TMP_PREFIX')
          echo "ISABELLE_TMP_PREFIX = $tmp"
          case "$tmp" in
            /cygdrive/d/*) echo "  OK: scratch is on D:" ;;
            *) echo "::error::ISABELLE_TMP_PREFIX is not on D: ($tmp) - C: will fill up"; exit 1 ;;
          esac
          t0=$(date +%s)
          "$BASH_CYG" -c "$PRE"' cd '"$ISA_CYG"' && bin/isabelle build -o parallel_proofs=0 -o system_heaps -b -- HOL Main'
          echo "heap build took $(( ($(date +%s) - t0) / 60 )) min"
          df -h | grep -Ei '^(Filesystem|[CD]:)' || true

      - name: Verify heaps
        run: |
          set -euo pipefail
          cd "/d/isa/$RELEASE"
          # Do NOT delete heaps/*/log -- see the note in Job B/C's verify step.
          n=$(ls heaps | wc -l)
          [ "$n" -eq 1 ] || { echo "::error::expected exactly 1 ML_IDENTIFIER dir, got $n"; ls heaps; exit 1; }
          id=$(ls heaps)
          echo "ML_IDENTIFIER = $id"
          for s in Pure HOL Main; do
            f="heaps/$id/$s"
            [ -f "$f" ] || { echo "::error::missing heap $id/$s"; exit 1; }
            printf '  %-5s %10s bytes  sha256=%s\n' "$s" "$(wc -c < "$f")" "$(sha256sum "$f" | cut -c1-16)"
            [ -f "heaps/$id/log/$s.db" ] || { echo "::error::missing session db $id/log/$s.db"; exit 1; }
          done
          [ "$(wc -c < "heaps/$id/HOL")" -gt 100000000 ] || { echo "::error::HOL heap suspiciously small"; exit 1; }
          ls -l "heaps/$id/log/"

      - name: Upload heaps
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release }}-heaps-windows
          path: D:/isa/${{ inputs.release }}/heaps
          if-no-files-found: error
          retention-days: 7

  # ===========================================================================
  # Job F: heap injection + conda packaging.
  #
  # Everything happens on Linux, for every target platform -- including win-64.
  # Nothing is compiled here; we unpack, copy heaps in, and zip the result into a
  # .conda.  (That the Windows package can be made on Linux is not a shortcut: it
  # is the same reason Job A cross-builds the .exe -- PACKAGING_DESIGN.md §5.0.)
  #
  # Mapping bundle x heaps -> conda subdir:
  #
  #   linux-64       <- bundle linux      + heaps linux
  #   linux-aarch64  <- bundle linux_arm  + heaps linux_arm
  #   osx-64         <- bundle macos      + heaps macos   \  ONE universal macOS bundle
  #   osx-arm64      <- bundle macos      + heaps macos   /  feeds BOTH osx subdirs
  #   win-64         <- bundle windows    + heaps windows
  #
  # The macOS heap artifact holds TWO ML_IDENTIFIER dirs (Job D builds with
  # ML_system_apple=false and =true).  scripts/pack.sh copies every ML_IDENTIFIER dir
  # it is given, so both osx packages carry both heaps.  That is deliberate: the macOS
  # bundle is universal anyway, and no ML_IDENTIFIER is hard-coded anywhere in this
  # pipeline (`isabelle getenv ML_IDENTIFIER` is EMPTY -- §5.1.1), so whichever
  # ML_PLATFORM a given Mac resolves to at run time, its heap is present.
  #
  # This job PUBLISHES NOTHING.  It verifies the packages against a local channel and
  # uploads them as an artifact; release.yml is what pushes them to R2.
  # ===========================================================================
  conda:
    name: "Job F - conda packages (all subdirs)"
    needs: [bundles, heaps-linux, heaps-macos, heaps-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELEASE: ${{ inputs.release }}
      CH: ${{ github.workspace }}/channel      # local channel, for verification only
      OUT: ${{ github.workspace }}/out
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Disk assertion (+ cleanup only if needed)
        run: |
          set -euo pipefail
          df -h /
          avail=$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
          echo "free on / = ${avail} GB"
          # Peak here: 4 bundles (~5 GB) + heaps (~2 GB) + one unpacked tree (~2.5 GB)
          # + one $PREFIX copy (~2.5 GB) + 5 finished .conda (~5 GB).  We unpack and
          # package ONE platform at a time and delete the staging in between.
          if [ "$avail" -lt "${{ inputs.min_free_gb }}" ]; then
            echo "::warning::free disk below threshold - running cleanup"
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                        /usr/local/.ghcup /usr/local/share/powershell \
                        /usr/share/swift /usr/local/share/chromium \
                        /opt/hostedtoolcache/CodeQL || true
            df -h /
          fi

      - name: Install 7-Zip + rattler-build
        run: |
          set -euo pipefail
          # 7-Zip: to unpack Job A's Windows SFX .exe.
          # !! The binary is `7z` on Debian/Ubuntu, NOT `7zz`.  `7zz` is upstream 7-Zip's
          # !! (and conda-forge's) name; Ubuntu's `7zip` package installs /usr/bin/7z.
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends 7zip

          # A REAL assertion.  The previous version of this line was
          #     7zz i > /dev/null && echo "7zz: ..."
          # which is a FAKE guard: under `set -e`, a command that is not the last in an
          # && list is exempt from errexit, so `7zz: command not found` was swallowed and
          # this step went GREEN with no 7-Zip at all.  The build then died 25 minutes
          # later inside pack.sh, on the fifth and last package.  Guards must be written
          # so that they can actually fail.
          command -v 7zz >/dev/null || command -v 7z >/dev/null || {
            echo "::error::no 7-Zip binary found (tried 7zz and 7z)"; exit 1; }
          echo "7-Zip: $(command -v 7zz || command -v 7z)"

          # rattler-build: a single static binary.  conda-build is in maintenance mode
          # and takes minutes where this takes seconds (PACKAGING_DESIGN.md §3.3).
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/rb.tar.gz \
            https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-x86_64-unknown-linux-musl.tar.gz
          tar xzf /tmp/rb.tar.gz -C /tmp
          mv /tmp/rattler-build-x86_64-unknown-linux-musl/rattler-build "$HOME/.local/bin/"
          chmod +x "$HOME/.local/bin/rattler-build"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/rattler-build" --version

      - name: Download all bundles (Job A)
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.release }}-bundle-*
          path: ${{ runner.temp }}/bundles

      - name: Download all heaps (Jobs B-E)
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.release }}-heaps-*
          path: ${{ runner.temp }}/heaps

      - name: Survey the inputs
        run: |
          set -euo pipefail
          echo "===== bundles ====="; find "$RUNNER_TEMP/bundles" -type f -printf '%10s  %p\n'
          echo "===== heaps ====="  ; find "$RUNNER_TEMP/heaps"   -type f -printf '%10s  %p\n'

      - name: "Inject heaps + build the conda packages"
        run: |
          set -euo pipefail
          B="$RUNNER_TEMP/bundles"
          H="$RUNNER_TEMP/heaps"
          export WORK="$RUNNER_TEMP/pack"

          # subdir | bundle artifact suffix | heaps artifact suffix | file inside the bundle artifact
          # (osx-64 and osx-arm64 both come from the ONE universal macOS bundle.)
          for spec in \
            "linux-64      linux      linux      ${RELEASE}_linux.tar.gz" \
            "linux-aarch64 linux_arm  linux_arm  ${RELEASE}_linux_arm.tar.gz" \
            "osx-64        macos      macos      ${RELEASE}_macos.tar.gz" \
            "osx-arm64     macos      macos      ${RELEASE}_macos.tar.gz" \
            "win-64        windows    windows    ${RELEASE}.exe"
          do
            set -- $spec
            subdir=$1; bsuf=$2; hsuf=$3; file=$4
            echo "::group::$subdir"
            scripts/pack.sh \
              --subdir "$subdir" \
              --bundle "$B/$RELEASE-bundle-$bsuf/$file" \
              --heaps  "$H/$RELEASE-heaps-$hsuf" \
              --out    "$OUT"
            # reclaim the unpacked tree + the build prefix before the next platform
            rm -rf "$WORK/stage" "$OUT/bld"
            df -h / | tail -1
            echo "::endgroup::"
          done

      - name: "All five packages present?"
        run: |
          set -euo pipefail
          fail=0
          for s in linux-64 linux-aarch64 osx-64 osx-arm64 win-64; do
            f=$(ls "$OUT/$s"/isabelle-*.conda 2>/dev/null || true)
            if [ -n "$f" ]; then
              printf '  OK    %-14s %s (%s)\n' "$s" "$(basename "$f")" "$(du -h "$f" | cut -f1)"
            else
              echo "::error::no package for $s"; fail=1
            fi
          done
          exit $fail

      # -------------------------------------------------------------------------
      # Verify against a LOCAL channel: deterministic, no network, no CDN in the
      # way (PACKAGING_DESIGN.md §5.4).  Only linux-64 can actually be RUN here --
      # the other four are cross-targets and this runner cannot execute them.
      # -------------------------------------------------------------------------
      - name: "Index a local channel and install linux-64 from it"
        run: |
          set -euo pipefail
          # The runner's preinstalled Miniconda is ROOT-owned; without this, both the
          # `conda install` below and the package cache that `conda create` writes to
          # ($CONDA/pkgs) fail with EACCES.
          sudo chown -R "$(id -u):$(id -g)" "$CONDA"
          $CONDA/bin/conda install -y -n base -c conda-forge conda-index -q

          mkdir -p "$CH/noarch"
          for s in linux-64 linux-aarch64 osx-64 osx-arm64 win-64; do
            mkdir -p "$CH/$s"; cp "$OUT/$s"/isabelle-*.conda "$CH/$s/"
          done
          # --no-zst: Cloudflare caches repodata.json.zst for 4h but never the plain
          # .json, and conda prefers the .zst -> a fresh publish would be invisible for
          # hours.  (PACKAGING_DESIGN.md §3.3)
          $CONDA/bin/python -m conda_index "$CH" --no-zst --no-bz2 --channeldata \
            --channel-name conda.qiyuan.me

          echo "===== what the channel advertises ====="
          $CONDA/bin/python - <<'PY'
          import json, pathlib, os
          ch = pathlib.Path(os.environ["CH"])
          for sub in sorted(p.name for p in ch.iterdir() if p.is_dir()):
              rd = ch / sub / "repodata.json"
              if not rd.exists(): continue
              for fn, m in json.load(rd.open())["packages.conda"].items():
                  print(f"  {sub:14s} {m['name']}-{m['version']}-{m['build']}  depends={m['depends']}")
          PY

          echo "===== conda create from the local channel ====="
          $CONDA/bin/conda create -y -p "$RUNNER_TEMP/isaenv" \
            -c "file://$CH" --override-channels isabelle

      - name: "Run the installed Isabelle (this is the actual proof)"
        run: |
          set -euo pipefail
          ENV="$RUNNER_TEMP/isaenv"
          export PATH="$ENV/bin:$PATH"

          echo "--- conda sees it ---"
          $CONDA/bin/conda list -p "$ENV" isabelle

          echo "--- bin/isabelle is the relative symlink into isa/ ---"
          ls -l "$ENV/bin/isabelle"

          echo "--- isabelle version ---"
          isabelle version

          echo "--- ISABELLE_HOME must resolve INTO the conda prefix ---"
          # $PREFIX/isa, not $PREFIX/opt/<release>: those 15 characters are charged
          # against Windows' MAX_PATH on every file in the package (see conda/recipe.yaml).
          # Isabelle does not care -- ISABELLE_HOME is derived from bin/isabelle's own
          # location, never from this directory's name.
          home=$(isabelle getenv -b ISABELLE_HOME)
          echo "ISABELLE_HOME = $home"
          [ "$home" = "$ENV/isa" ] || { echo "::error::ISABELLE_HOME is $home, expected $ENV/isa"; exit 1; }

          echo "--- the prebuilt heaps shipped INSIDE the package ---"
          ls -l "$home"/heaps/*/ "$home"/heaps/*/log/

          # -------------------------------------------------------------------------
          # The heap must actually be USED.  Build a one-line session on top of Main and
          # assert that HOL is NOT recompiled.
          #
          # Do NOT "verify" this with `isabelle build -n` (a dry run).  It is a FALSE
          # PASS: with the session databases missing it still printed nothing to build,
          # while a real build turned around and recompiled the whole of HOL.  Only a
          # real build tells the truth.
          # -------------------------------------------------------------------------
          P="$RUNNER_TEMP/probe"; mkdir -p "$P"
          printf 'theory T imports Main begin\nlemma "(2::nat) + 2 = 4" by simp\nend\n' > "$P/T.thy"
          printf 'session Probe = HOL +\n  theories T\n' > "$P/ROOT"

          echo "--- building a session that imports Main ---"
          t0=$(date +%s)
          isabelle build -d "$P" Probe 2>&1 | tee "$RUNNER_TEMP/probe.log"
          echo "took $(( $(date +%s) - t0 ))s"

          if grep -q 'Building HOL' "$RUNNER_TEMP/probe.log"; then
            echo "::error::Isabelle REBUILT HOL -- the shipped heap was not used."
            echo "          Almost certainly heaps/<ML_ID>/log/*.db did not make it into"
            echo "          the package; without the session database the heap is ignored."
            exit 1
          fi
          grep -q 'Finished Probe' "$RUNNER_TEMP/probe.log" || {
            echo "::error::the probe session did not build"; exit 1; }
          echo "  -> HOL was NOT rebuilt: the prebuilt heap in the package was loaded."

      # -------------------------------------------------------------------------
      # The GUI is the one thing no headless assertion reaches: every check above
      # passes on a package whose jEdit dies on startup.  So: run jEdit under Xvfb on
      # a theory with one lemma that must succeed and one that must fail, screenshot
      # it, and have Claude Code look at the pixels.  The verdict is the DISCRIMINATING
      # pair -- an error marker on exactly the bad line -- because "a window appeared"
      # is satisfied by an empty frame.  See scripts/verify_gui.sh for the reasoning
      # (notably: it pins ML_system_64 from the shipped heap's name, or jEdit silently
      # rebuilds HOL in a dialog and the screenshot goes falsely green).
      # -------------------------------------------------------------------------
      - name: Install GUI-check deps (Xvfb, xdotool, ImageMagick)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb x11-utils xdotool imagemagick
          for t in Xvfb xdpyinfo xdotool import jq; do
            command -v "$t" >/dev/null || { echo "::error::missing $t"; exit 1; }
          done

      - name: "GUI verification: start jEdit and have Claude Code judge the screenshot"
        env:
          # OAuth (subscription) token ONLY.  Never add ANTHROPIC_API_KEY here.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: scripts/verify_gui.sh "$RUNNER_TEMP/isaenv" "$RUNNER_TEMP/gui"

      - name: Upload the GUI screenshot + verdict
        if: always()          # on failure this IS the evidence -- upload it either way
        uses: actions/upload-artifact@v4
        with:
          name: gui-verification
          path: |
            ${{ runner.temp }}/gui/jedit.png
            ${{ runner.temp }}/gui/verdict.json
            ${{ runner.temp }}/gui/jedit.log
            ${{ runner.temp }}/gui/claude.err
            ${{ runner.temp }}/gui/xvfb.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload the conda packages
        uses: actions/upload-artifact@v4
        with:
          name: conda-packages
          path: ${{ github.workspace }}/out/*/isabelle-*.conda
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  # ===========================================================================
  # Jobs G and H: INSTALL AND RUN the packages Job F built, on the platforms they
  # are actually for.
  #
  # Job F can only run what it builds on: linux-64.  The other four are cross-built
  # from Linux and, until now, nothing had ever executed them -- we had proved
  # "it packages", not "it runs".  win-64 was covered by hand on a Windows VM.
  # These two jobs close the remaining three:
  #
  #   Job G  macos-14          osx-arm64 (native)  +  osx-64 (through Rosetta)
  #   Job H  ubuntu-24.04-arm  linux-aarch64
  #
  # Both consume Job F's `conda-packages` artifact, so what is installed here is the
  # EXACT byte-for-byte package that would be published -- not a rebuild of it.
  #
  # The load-bearing assertion in both is the same one as in Job F, for the same
  # reason: build a real session on top of Main and require that HOL is NOT recompiled.
  # `isabelle build -n` must never be used for this -- it is a FALSE PASS (with the
  # session databases missing it happily reports nothing to build, while a real build
  # turns around and rebuilds the whole of HOL).
  # ===========================================================================

  install-macos:
    name: "Job G - install + run (osx-arm64 & osx-64)"
    needs: conda
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Free up disk (drop the extra Xcodes)
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /Applications/Xcode_*.app || true
          df -h /

      - name: Download the conda packages (Job F)
        uses: actions/download-artifact@v4
        with:
          name: conda-packages
          path: ${{ runner.temp }}/pkgs

      - name: Build a local channel with just the macOS packages
        run: |
          set -euo pipefail
          CH="$RUNNER_TEMP/channel"
          mkdir -p "$CH/noarch"
          # Only the two we can run here.  The others are several GB and this runner is
          # the tightest on disk of the whole matrix.
          for s in osx-64 osx-arm64; do
            [ -d "$RUNNER_TEMP/pkgs/$s" ] || { echo "::error::Job F produced no $s package"; exit 1; }
            mkdir -p "$CH/$s"
            cp "$RUNNER_TEMP/pkgs/$s"/isabelle-*.conda "$CH/$s/"
          done
          rm -rf "$RUNNER_TEMP/pkgs"
          find "$CH" -name '*.conda' -exec ls -lh {} \;
          echo "CH=$CH" >> "$GITHUB_ENV"

          # Miniforge rather than the preinstalled $CONDA: it exists on every runner we
          # use, arm64 included, and it is ours (no root-owned prefix to chown).
          curl -fsSL -o "$RUNNER_TEMP/mf.sh" \
            https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-MacOSX-arm64.sh
          bash "$RUNNER_TEMP/mf.sh" -b -p "$HOME/mf"
          "$HOME/mf/bin/conda" install -y -q -c conda-forge conda-index
          "$HOME/mf/bin/python" -m conda_index "$CH" --no-zst --no-bz2 --channeldata \
            --channel-name conda.qiyuan.me
          echo "===== what the channel advertises ====="
          grep -o '"subdir": "[^"]*"' "$CH"/osx-64/repodata.json "$CH"/osx-arm64/repodata.json | sort -u

      - name: "osx-arm64 (native): install and RUN"
        run: |
          set -euo pipefail
          ENV="$RUNNER_TEMP/isa-arm"
          "$HOME/mf/bin/conda" create -y -p "$ENV" -c "file://$CH" --override-channels isabelle
          scripts/verify_install.sh "$ENV"

      - name: "osx-64 (through Rosetta): install and RUN"
        run: |
          set -euo pipefail
          # Rosetta 2 is preinstalled on macos-14 and Job D already builds the x86_64 heap
          # through it.  `arch -x86_64` makes uname -m report x86_64, which is what
          # lib/scripts/getsettings keys ISABELLE_PLATFORM off -- so this exercises the
          # SAME code path an Intel Mac would take, including the x86_64_32-darwin heap.
          arch -x86_64 /usr/bin/true || { echo "::error::Rosetta is not usable on this runner"; exit 1; }
          ENV="$RUNNER_TEMP/isa-x86"
          # CONDA_SUBDIR pins the solve to osx-64 even though the machine is arm64.
          CONDA_SUBDIR=osx-64 "$HOME/mf/bin/conda" create -y -p "$ENV" \
            -c "file://$CH" --override-channels isabelle
          ARCH_PREFIX="arch -x86_64" scripts/verify_install.sh "$ENV"

      # ---------------------------------------------------------------------
      # Is there a usable window server on a macOS runner at all?  I do not know, and
      # I am not going to pretend either way -- so PROBE it and print the answer.
      # This step can never fail the job; it exists to turn "unknown" into "measured",
      # so we can decide whether a macOS GUI check is even possible.
      #
      # (verify_gui.sh cannot be reused as-is here regardless: it drives Xvfb, and macOS
      # jEdit renders through Quartz, not X11.)
      # ---------------------------------------------------------------------
      - name: "PROBE (advisory): does this runner have a window server?"
        continue-on-error: true
        run: |
          set +e
          echo "--- GUI session according to launchd ---"
          launchctl print "gui/$(id -u)" 2>&1 | head -5
          echo "--- can we actually capture the screen? ---"
          screencapture -x "$RUNNER_TEMP/probe.png" 2>&1
          rc=$?
          if [ $rc -eq 0 ] && [ -s "$RUNNER_TEMP/probe.png" ]; then
            echo "RESULT: screencapture SUCCEEDED -> $(file -b "$RUNNER_TEMP/probe.png")"
            echo "::warning::macOS runner HAS a usable window server - a real jEdit GUI check is feasible here."
          else
            echo "RESULT: screencapture failed (rc=$rc) - no window server reachable."
            echo "::warning::macOS GUI is NOT verified: this runner has no usable window server."
          fi

      - name: Upload the macOS GUI probe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-gui-probe
          path: ${{ runner.temp }}/probe.png
          if-no-files-found: ignore
          retention-days: 7

  install-linux-arm:
    name: "Job H - install + run + GUI (linux-aarch64)"
    needs: conda
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Download the conda packages (Job F)
        uses: actions/download-artifact@v4
        with:
          name: conda-packages
          path: ${{ runner.temp }}/pkgs

      - name: Build a local channel with just the linux-aarch64 package
        run: |
          set -euo pipefail
          CH="$RUNNER_TEMP/channel"
          mkdir -p "$CH/noarch" "$CH/linux-aarch64"
          [ -d "$RUNNER_TEMP/pkgs/linux-aarch64" ] || { echo "::error::Job F produced no linux-aarch64 package"; exit 1; }
          cp "$RUNNER_TEMP/pkgs/linux-aarch64"/isabelle-*.conda "$CH/linux-aarch64/"
          rm -rf "$RUNNER_TEMP/pkgs"
          ls -lh "$CH/linux-aarch64"
          echo "CH=$CH" >> "$GITHUB_ENV"

          curl -fsSL -o "$RUNNER_TEMP/mf.sh" \
            https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-aarch64.sh
          bash "$RUNNER_TEMP/mf.sh" -b -p "$HOME/mf"
          "$HOME/mf/bin/conda" install -y -q -c conda-forge conda-index
          "$HOME/mf/bin/python" -m conda_index "$CH" --no-zst --no-bz2 --channeldata \
            --channel-name conda.qiyuan.me

      - name: "linux-aarch64: install and RUN"
        run: |
          set -euo pipefail
          ENV="$RUNNER_TEMP/isaenv"
          "$HOME/mf/bin/conda" create -y -p "$ENV" -c "file://$CH" --override-channels isabelle
          scripts/verify_install.sh "$ENV"
          echo "ENV=$ENV" >> "$GITHUB_ENV"

      - name: Install GUI-check deps (Xvfb, xdotool, ImageMagick)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb x11-utils xdotool imagemagick
          for t in Xvfb xdpyinfo xdotool import jq; do
            command -v "$t" >/dev/null || { echo "::error::missing $t"; exit 1; }
          done

      # The same GUI check as Job F, on ARM.  jEdit is a JVM app and the bundle carries an
      # arm64 JDK, so this should just work -- but "should" is exactly the word that has
      # been wrong every time in this pipeline, so we run it.
      - name: "GUI verification on ARM: jEdit under Xvfb, judged by Claude Code"
        env:
          # OAuth (subscription) token ONLY.  Never add ANTHROPIC_API_KEY here.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: scripts/verify_gui.sh "$ENV" "$RUNNER_TEMP/gui"

      - name: Upload the ARM GUI screenshot + verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-verification-arm
          path: |
            ${{ runner.temp }}/gui/jedit.png
            ${{ runner.temp }}/gui/verdict.json
            ${{ runner.temp }}/gui/jedit.log
            ${{ runner.temp }}/gui/claude.err
            ${{ runner.temp }}/gui/xvfb.log
          if-no-files-found: warn
          retention-days: 7
