name: release

# Publish the conda packages to our channel at https://conda.qiyuan.me (R2 bucket `conda`).
#
# Publishing is deliberately NOT a side effect of pushing (PACKAGING_DESIGN.md §5.4):
# once a package is on the channel a user may already have pulled it, so it can neither
# be deleted nor overwritten.  You get here by tagging, or by pressing the button.
#
# The whole distribution is REBUILT here (build.yml runs again) rather than promoting an
# old CI run's artifacts: what we publish is then exactly the bytes that were just
# verified, in this run, and the release does not depend on some past run still existing.
#
# Rules baked in below, each of which cost real debugging (see §3.3):
#   * rclone >= 1.74 and --s3-no-check-bucket.  Ubuntu's 1.60 fails the FIRST PUT of
#     every object against R2 -- on a 1 GB package that means uploading it twice.
#   * conda index --no-zst.  Cloudflare caches repodata.json.zst for 4h but never the
#     plain .json, and conda prefers the .zst -> a fresh publish would be invisible for
#     hours.  Not producing the .zst sidesteps the whole thing.
#   * PULL the channel down before indexing.  conda-index only indexes what is on disk,
#     and `rclone sync` DELETES whatever is in the bucket but not locally.  Skipping the
#     pull would wipe every previously published package.
#   * Never overwrite a published file.  Changed content => bump the build number
#     (ISA_BUILD_NUMBER), which changes the file name.

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "conda build number - BUMP THIS if you republish the same Isabelle release with changed content"
        type: string
        default: "0"
  push:
    tags: ['v*']

jobs:
  # Rebuild + verify everything (Jobs A-F).  Job F already proves the packages install
  # and run, from a local channel.
  build:
    uses: ./.github/workflows/build.yml
    with:
      release: Isabelle2025-2
      platforms: linux,linux_arm,windows,macos
    # the GUI check in Job F needs CLAUDE_CODE_OAUTH_TOKEN; a reusable workflow
    # receives NO secrets unless the caller passes them.
    secrets: inherit

  publish:
    name: "Publish to conda.qiyuan.me (R2)"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CH: ${{ github.workspace }}/channel
      R2_BUCKET: conda
    steps:
      - name: Download the conda packages from Job F
        uses: actions/download-artifact@v4
        with:
          name: conda-packages
          path: ${{ runner.temp }}/pkgs

      - name: Install rclone (>= 1.74) and conda-index
        run: |
          set -euo pipefail
          # Ubuntu ships rclone 1.60, which is BROKEN against R2: without
          # --s3-no-check-bucket it 403s, and every object's first PUT fails.
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version | head -1
          # the runner's preinstalled Miniconda is ROOT-owned -- conda install would EACCES
          sudo chown -R "$(id -u):$(id -g)" "$CONDA"
          $CONDA/bin/conda install -y -n base -c conda-forge conda-index -q

      - name: Configure the R2 remote (credentials never touch the disk)
        env:
          CONDA_R2_ACCESS_KEY_ID: ${{ secrets.CONDA_R2_ACCESS_KEY_ID }}
          CONDA_R2_SECRET_ACCESS_KEY: ${{ secrets.CONDA_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          # rclone reads a remote called "R2" straight out of the environment; nothing
          # is written to a config file.
          {
            echo "RCLONE_CONFIG_R2_TYPE=s3"
            echo "RCLONE_CONFIG_R2_PROVIDER=Cloudflare"
            echo "RCLONE_CONFIG_R2_REGION=auto"
            echo "RCLONE_CONFIG_R2_ENDPOINT=https://532d99283b5aa1e02486ee3fdcb163d5.r2.cloudflarestorage.com"
            echo "RCLONE_CONFIG_R2_ACCESS_KEY_ID=$CONDA_R2_ACCESS_KEY_ID"
            echo "RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=$CONDA_R2_SECRET_ACCESS_KEY"
          } >> "$GITHUB_ENV"

      - name: "Pull the existing channel  <-- without this, the sync would DELETE it"
        run: |
          set -euo pipefail
          mkdir -p "$CH"
          rclone sync "R2:$R2_BUCKET/" "$CH/" --s3-no-check-bucket --fast-list --transfers 8
          echo "===== channel as it stands today ====="
          find "$CH" -name '*.conda' -printf '  %10s  %p\n' | sort -k2 || echo "  (channel is empty)"

      - name: Add the new packages
        run: |
          set -euo pipefail
          # The artifact preserves Job F's out/<subdir>/ layout.
          for d in "$RUNNER_TEMP/pkgs"/*/; do
            sub=$(basename "$d")
            for f in "$d"isabelle-*.conda; do
              [ -e "$f" ] || continue
              if [ -e "$CH/$sub/$(basename "$f")" ]; then
                # A published package is immutable: users and the CDN cache it by name.
                # Republishing changed content under the same name hands people a stale
                # copy forever.  Bump the build number instead.
                echo "::error::$sub/$(basename "$f") is ALREADY on the channel."
                echo "          Never overwrite a published package -- re-run with a"
                echo "          higher build_number instead."
                exit 1
              fi
              mkdir -p "$CH/$sub"
              cp "$f" "$CH/$sub/"
              echo "  + $sub/$(basename "$f")"
            done
          done

      - name: Re-index the channel
        run: |
          set -euo pipefail
          mkdir -p "$CH/noarch"
          $CONDA/bin/python -m conda_index "$CH" --no-zst --no-bz2 --channeldata \
            --channel-name conda.qiyuan.me

      - name: Sync to R2
        run: |
          set -euo pipefail
          # --exclude .cache: conda-index's sqlite incremental cache is local-only.
          rclone sync "$CH/" "R2:$R2_BUCKET/" \
            --s3-no-check-bucket --exclude '.cache/**' \
            --s3-chunk-size 64M --s3-upload-concurrency 4 --transfers 2 --progress

      - name: "Verify what actually landed on the channel"
        run: |
          set -euo pipefail
          fail=0
          # The .conda files are NOT cached by Cloudflare (only repodata.json.zst is,
          # and we do not produce that) -> a plain GET is always the fresh bytes.
          for d in "$RUNNER_TEMP/pkgs"/*/; do
            sub=$(basename "$d")
            for f in "$d"isabelle-*.conda; do
              [ -e "$f" ] || continue
              fn=$(basename "$f")
              url="https://conda.qiyuan.me/$sub/$fn"
              want=$(sha256sum "$f" | cut -d' ' -f1)
              got=$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)
              if [ "$want" = "$got" ]; then
                printf '  OK    %-14s %s\n' "$sub" "$fn"
              else
                echo "::error::$url does not match the package we built"
                echo "        built:  $want"
                echo "        served: $got"
                fail=1
              fi
            done
          done
          echo "--- and the channel resolves the package ---"
          $CONDA/bin/conda search -c https://conda.qiyuan.me --override-channels isabelle || fail=1
          exit $fail

  # ---------------------------------------------------------------------------
  # The user's command, on a clean machine, on every platform.
  #
  # This is NOT a repeat of Jobs F/G/H.  Those install from a LOCAL channel
  # (file://) and prove the PACKAGES work.  This installs from the real URL and
  # proves the CHANNEL works -- that the bytes reached R2, that conda-index wrote
  # a repodata that names them correctly, and that conda's solver can act on it.
  # Those two can fail independently: a package can be perfect while `rclone sync`
  # drops a file or repodata points at a filename that isn't there.  Job F would
  # still be green and the user still could not install.
  #
  # Running it immediately after publishing is safe, and that is measured, not
  # assumed: repodata.json comes back `cf-cache-status: DYNAMIC` (Cloudflare does
  # not cache .json by default) and we index with --no-zst, so the .zst that IS
  # cached for 4h never exists.  There is no propagation window to wait out.
  # ---------------------------------------------------------------------------
  smoke:
    name: "Smoke: conda install from conda.qiyuan.me (${{ matrix.runner }})"
    needs: publish
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false          # one platform's failure must not hide the others
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-activate-base: true
          activate-environment: ""

      - name: "conda install -c https://conda.qiyuan.me isabelle"
        run: |
          set -euo pipefail
          conda create -y -p "$RUNNER_TEMP/isa" \
            -c https://conda.qiyuan.me --override-channels isabelle
          conda list -p "$RUNNER_TEMP/isa" isabelle

      - name: "...and it runs"
        run: |
          set -euo pipefail
          # Windows puts the entry point in Scripts/, everyone else in bin/.
          if [ -x "$RUNNER_TEMP/isa/bin/isabelle" ]; then
            BIN="$RUNNER_TEMP/isa/bin/isabelle"
          else
            BIN="$RUNNER_TEMP/isa/Scripts/isabelle.bat"
          fi
          echo "entry point: $BIN"
          v=$("$BIN" version)
          echo "isabelle version -> $v"
          [ -n "$v" ] || { echo "::error::isabelle version printed nothing"; exit 1; }
