schema_version: 1

# rocksdict, repackaged from upstream's own PyPI wheels onto conda.qiyuan.me.
#
# WHY WE CARRY A THIRD-PARTY PACKAGE AT ALL
#
# conda-forge has rocksdict for linux-64, osx-64 and win-64 only -- no osx-arm64, no
# linux-aarch64, and only ever version 0.3.23.  isabelle-semantic-embedding imports it at
# module level (premise_selection.py), so conda-forge's coverage would cap that package at
# three platforms and lock Apple Silicon out, even though the base `isabelle` package ships
# all five and our own natives build fine there.
#
# DROP THIS the moment conda-forge gains osx-arm64 and linux-aarch64.  It exists to fill a
# packaging gap, not because upstream lacks support: PyPI has had all five platforms all
# along.
#
# WHAT THIS IS NOT: a build.  We do not compile RocksDB.  The wheel is upstream's own
# artifact, downloaded by URL and pinned by sha256; we only re-wrap it in conda's format.
# That is why carrying it is cheap.
#
# NOT abi3: every rocksdict wheel is tied to one CPython version (cp310 … cp314), so the
# matrix is platform x python, not platform.  The workflow drives that; this recipe builds
# exactly one (platform, python) pair from the URL and hash it is given.

context:
  version: ${{ env.get("ROCKSDICT_VERSION", default="0.3.29") }}
  wheel_url: ${{ env.get("ROCKSDICT_WHEEL_URL") }}
  wheel_sha: ${{ env.get("ROCKSDICT_WHEEL_SHA256") }}
  py: ${{ env.get("ROCKSDICT_PY") }}

package:
  name: rocksdict
  version: ${{ version }}

source:
  - url: ${{ wheel_url }}
    sha256: ${{ wheel_sha }}
    # NOT renamed: pip parses the wheel FILENAME for name/version/python/abi/platform, so
    # a `file_name: rocksdict.whl` here makes it reject the file outright ("Invalid wheel
    # filename (wrong number of parts)").  The script globs for it instead.

build:
  number: 0
  # Not noarch: the wheel carries a compiled extension for one platform and one CPython.
  string: py${{ py | replace(".", "") }}_0
  # Do not rewrite the extension's load commands.  rattler-build relinks binaries by
  # default so their rpaths point into the conda prefix, and on osx-arm64 that fails
  # outright -- upstream's wheel was not linked with spare header padding, so
  # install_name_tool reports "larger updated load commands do not fit".
  #
  # The rewrite is pointless here anyway: a PyPI wheel is self-contained by construction
  # (delocate/auditwheel bundle whatever it needs), so the extension links against system
  # libraries and its own vendored copies, never against anything in the prefix.  There is
  # no rpath that wants fixing.
  dynamic_linking:
    binary_relocation: false
  script:
    # python, NOT bash.  rattler-build has no bash in the build environment on Windows
    # ("interpreter `bash` was not found"), and this script needs no shell: it installs a
    # wheel and asserts the result.  Using python removes the whole class of Windows shell
    # problems and keeps one script for all five platforms.
    interpreter: python
    content: |
      import os, pathlib, subprocess, sys, sysconfig

      whls = sorted(pathlib.Path(os.environ["SRC_DIR"]).glob("*.whl"))
      assert len(whls) == 1, f"expected exactly one wheel in SRC_DIR, got {whls}"
      src = whls[0]
      print("repackaging:", src.name)
      # --no-deps: rocksdict needs nothing beyond CPython, and anything it did need would
      # be conda's job to resolve, not pip's.
      subprocess.run([sys.executable, "-m", "pip", "install", str(src), "--no-deps", "-vv"],
                     check=True)

      # The point of the exercise: prove the compiled extension really landed, so a
      # mis-specified wheel URL cannot ship an empty package.
      sp = pathlib.Path(sysconfig.get_paths()["purelib"]) / "rocksdict"
      assert sp.is_dir(), f"{sp} missing"
      ext = [p for p in sp.rglob("*") if p.suffix in (".so", ".pyd", ".dylib")]
      assert ext, f"no compiled extension under {sp}"
      print("installed extension:", ext[0])

requirements:
  host:
    - python ${{ py }}.*
    - pip
  run:
    # Pinned to the exact CPython the wheel was built for -- there is no abi3 here, so a
    # 3.12 wheel under 3.13 would import-fail at run time.
    - python ${{ py }}.*

tests:
  - python:
      imports:
        - rocksdict
      pip_check: true

about:
  homepage: https://github.com/Congyuwang/RocksDict
  summary: "Python binding for RocksDB (repackaged from the upstream wheel)"
  description: |
    RocksDict, repackaged unmodified from the wheel its authors publish on PyPI, so that
    conda users on Apple Silicon and aarch64 Linux can install it -- conda-forge builds it
    for x86-64 platforms only.  No source is compiled here; the wheel is pinned by sha256.
  license: MIT
  repository: https://github.com/Congyuwang/RocksDict
