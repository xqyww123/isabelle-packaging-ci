schema_version: 1

# The `isabelle` conda package: our PATCHED Isabelle distribution, with the
# natively-built Pure/HOL/Main heaps already inside it.
#
# EVERYTHING ships inside the package.  Nothing is downloaded or generated by a
# post-link script, because conda does not track files a post-link creates
# (PACKAGING_DESIGN.md §3.1): they would not show up in `conda list`, would not
# be removed by `conda remove`, and would not be reproducible.
#
# The tree to package is handed in via $ISA_STAGE by scripts/pack.sh -- a Job A
# platform bundle with a Job B-E heap directory injected into heaps/.
# We deliberately do NOT use a `source:` entry: that would make rattler-build
# copy the whole ~2.4 GB tree into its work dir before the build script copies it
# again into $PREFIX.  Copying straight from $ISA_STAGE halves the I/O.

context:
  version: "2025.2"                                        # conda versions cannot contain '-'  =>  Isabelle2025-2 -> 2025.2
  release: ${{ env.get("ISA_RELEASE", default="Isabelle2025-2") }}
  isabelle_id: ${{ env.get("ISA_ID", default="unknown") }}  # hg changeset of OUR patch commit
  build_number: ${{ env.get("ISA_BUILD_NUMBER", default="0") }}

package:
  name: isabelle
  version: ${{ version }}

build:
  number: ${{ build_number }}

  # The build string is JUST the build number -- deliberately.
  #
  # It used to be "<hg-changeset>_<number>", which reads better but costs 12 characters
  # in EVERY installed path, because conda extracts into  pkgs\<name>-<version>-<string>\.
  # On Windows that is charged against MAX_PATH (259 usable), and the package did not fit:
  # `conda create` died with InvalidArchiveError on a 262-character path.  LongPathsEnabled
  # is 0 by default on Windows 11 and needs admin + reboot, and no conda script can help --
  # the failure happens while unpacking into the pkgs cache, before any post-link runs.
  #
  # The changeset is NOT lost: it is in about.description below, and authoritatively in
  # the tree itself at isa/etc/ISABELLE_ID.
  #
  # CHANGED content => bump ISA_BUILD_NUMBER, never overwrite a published file (§3.3).
  string: ${{ build_number }}

  # ---------------------------------------------------------------------------
  # Hands off the payload.  Both of these are load-bearing, not tuning knobs.
  # ---------------------------------------------------------------------------
  dynamic_linking:
    # Isabelle ships its OWN Poly/ML, JDK, E, Z3, ... already linked and working.
    # Letting rattler-build rewrite their RPATHs would be, at best, a no-op on
    # thousands of prebuilt binaries and, at worst, corruption.
    binary_relocation: false
    missing_dso_allowlist: ["*"]

  prefix_detection:
    # Do not scan/patch the payload for the build prefix.  An Isabelle bundle is
    # relocatable by construction (bin/isabelle derives ISABELLE_HOME from its own
    # location at run time), so there is nothing to rewrite -- and we must not let
    # a byte-level "prefix replacement" anywhere near the 350 MB HOL heap.
    ignore: true
    ignore_binary_files: true

  script:
    interpreter: bash          # the build always runs on Linux, even for the win-64 target
    env:
      ISA_STAGE: ${{ env.get("ISA_STAGE") }}
      ISA_RELEASE: ${{ release }}
    content: |
      set -euo pipefail

      test -n "${ISA_STAGE:-}"      || { echo "ISA_STAGE not set"; exit 1; }
      test -d "$ISA_STAGE"          || { echo "ISA_STAGE=$ISA_STAGE is not a directory"; exit 1; }
      test -d "$ISA_STAGE/heaps"    || { echo "no heaps/ in $ISA_STAGE -- heap injection did not happen"; exit 1; }

      # The whole distribution goes to $PREFIX/isa/ -- NOT $PREFIX/opt/<release>/.
      #
      # "opt/Isabelle2025-2/" is 19 characters; "isa/" is 4.  Those 15 characters are
      # charged against Windows' MAX_PATH on every single file in the package, and we
      # need them: with the old layout the longest path was 212 characters and
      # `conda create` could not even unpack the package on a default Windows box.
      #
      # This changes nothing for Isabelle or for the user: ISABELLE_HOME is derived at
      # run time from the location of bin/isabelle (via the symlink below), never from
      # this directory's name.  It is not a rename of anything INSIDE the Isabelle tree
      # -- that tree is untouched -- only a choice of where we park it in $PREFIX.
      mkdir -p "$PREFIX"
      cp -a "$ISA_STAGE" "$PREFIX/isa"

      case "$target_platform" in
        win-*)
          # Windows: conda puts %PREFIX%\Scripts on PATH.  Forward to the real launcher
          # inside the tree.  (bin/isabelle itself is a Cygwin bash script; cmd.exe
          # cannot run it -- PACKAGING_DESIGN.md §3.6.)  pack.sh installs that launcher
          # at isa\bin\isabelle.bat; it is self-locating, so this forwarder is the only
          # thing that needs to know where the tree lives.
          mkdir -p "$PREFIX/Scripts"
          printf '@echo off\r\n"%%~dp0..\\isa\\bin\\isabelle.bat" %%*\r\n' \
            > "$PREFIX/Scripts/isabelle.bat"

          # The two gaps that used to make win-64 non-functional are both CLOSED and
          # verified on a real Windows VM (PACKAGING_DESIGN.md §3.6):
          #  (1) isa\bin\isabelle.bat -- the forwarder's target -- is now installed by
          #      pack.sh (self-locating, byte-identical to windows/isabelle.bat, cmp-checked).
          #  (2) Cygwin heals itself on the FIRST `isabelle` call: getsettings runs
          #      Setup.classpath, which runs cygwin_init (restores symlinks + rebaseall).
          #      No post-link, no untracked files.
          # So the win-64 command line works end to end: `isabelle version`, a real build
          # with the prebuilt heap, jEdit and vscode all verified on the VM, and the
          # windows smoke leg (release.yml) runs `isabelle.bat version` from the real channel.

          # Post-install hint (Windows).  Same message channel as the unix branch, but a
          # .bat -- conda runs Scripts/.<name>-post-link.bat.  Written with CRLF (printf
          # '%s\r\n'), like the forwarder above.  Recommends PowerShell/cmd, NOT Git-Bash,
          # where conda is not on PATH (exactly what broke the first Windows smoke run).
          # ENV_REF: %%~ni is the env's basename; if the prefix is not under envs\ (base,
          # or a `-p <path>` env) fall back to the full %PREFIX% path.
          #
          # CRITICAL: end with `exit /b 0`.  conda treats a NONZERO post-link exit as a
          # LinkError and ROLLS BACK the whole install -- and the `findstr` above leaves
          # errorlevel 1 whenever the prefix is not under envs\, which broke every
          # Windows `conda install` (the message still printed, then the install failed).
          # A cosmetic hint must never be able to fail the install.
          printf '%s\r\n' \
            '@echo off' \
            'for %%i in ("%PREFIX%") do set "ENV_REF=%%~ni"' \
            'echo "%PREFIX%" | findstr /C:"\envs\" >nul || set "ENV_REF=%PREFIX%"' \
            '>>"%PREFIX%\.messages.txt" echo.' \
            '>>"%PREFIX%\.messages.txt" echo Isabelle is installed.' \
            '>>"%PREFIX%\.messages.txt" echo.' \
            '>>"%PREFIX%\.messages.txt" echo Use PowerShell or Command Prompt -- NOT Git-Bash, where conda is not on PATH.' \
            '>>"%PREFIX%\.messages.txt" echo Before using Isabelle, activate its environment:' \
            '>>"%PREFIX%\.messages.txt" echo.' \
            '>>"%PREFIX%\.messages.txt" echo   conda activate %ENV_REF%' \
            '>>"%PREFIX%\.messages.txt" echo   isabelle jedit      GUI jEdit' \
            '>>"%PREFIX%\.messages.txt" echo   isabelle vscode     VSCode / VSCodium GUI' \
            'exit /b 0' \
            > "$PREFIX/Scripts/.isabelle-post-link.bat"
          ;;
        *)
          # Linux/macOS: a RELATIVE symlink is all that is needed.  bin/isabelle has
          # an explicit `if [ -L "$0" ]` branch that resolves the link and re-execs
          # through it, so ISABELLE_HOME still comes out as $PREFIX/isa.
          # This is the same hookup the Isabelle docs tell users to make by hand.
          mkdir -p "$PREFIX/bin"
          ln -s "../isa/bin/isabelle" "$PREFIX/bin/isabelle"

          # Post-install hint.  conda runs bin/.<name>-post-link.sh after linking, with
          # $PREFIX / $PKG_NAME set, and prints whatever the script appends to
          # $PREFIX/.messages.txt (then removes it) -- verified against conda 25.11.
          # This is message-ONLY: it creates no tracked payload, so it does not violate
          # "everything ships in the package" (§3.1); it only writes to conda's own
          # message channel.  Each arg is single-quoted so $PREFIX/$ENV_REF stay literal
          # in the generated script and are expanded at INSTALL time, not now.  ENV_REF
          # is the short env name when under envs/, else the full prefix path (which
          # `conda activate` also accepts -- covers base and `conda create -p <path>`).
          printf '%s\n' \
            '#!/bin/bash' \
            'case "$PREFIX" in' \
            '  */envs/*) ENV_REF="$(basename "$PREFIX")" ;;' \
            '  *)        ENV_REF="$PREFIX" ;;' \
            'esac' \
            'cat >> "$PREFIX/.messages.txt" <<MSG' \
            '' \
            'Isabelle is installed.' \
            '' \
            'Before using Isabelle, activate its conda environment:' \
            '' \
            '  conda activate $ENV_REF' \
            '' \
            'Then:' \
            '' \
            '  isabelle jedit          # GUI (jEdit)' \
            '  isabelle build -b HOL   # headless build' \
            '  isabelle vscode         # VSCode / VSCodium GUI' \
            'MSG' \
            'exit 0' \
            > "$PREFIX/bin/.isabelle-post-link.sh"
          chmod +x "$PREFIX/bin/.isabelle-post-link.sh"
          ;;
      esac

# No `requirements:` at all -- and that is correct, not an oversight.  An Isabelle
# bundle vendors its entire runtime (Poly/ML, JDK, E, Z3, Vampire, ...); it depends
# on nothing from the channel.

tests:
  - script:
      - if: unix
        then:
          - isabelle version
          - isabelle getenv -b ISABELLE_HOME
          # the heaps must be IN the package, at the place Isabelle looks for them
          - test -d "$PREFIX/isa/heaps"
          - ls "$PREFIX/isa"/heaps/*/HOL
        else:
          - isabelle.bat version

about:
  homepage: https://isabelle.in.tum.de
  summary: Isabelle proof assistant (patched build, with prebuilt Pure/HOL/Main heaps)
  description: |
    The Isabelle generic proof assistant, built from the official sources with the
    my-better-isabelle-prover `user` patch category applied, bundled exactly like an
    official release (vendored Poly/ML, JDK, E, Z3, ...) and shipping prebuilt
    Pure/HOL/Main heaps for this platform.

    Upstream release: ${{ release }}
    Built from hg changeset: ${{ isabelle_id }}
      (this is the changeset of OUR patch commit; it used to live in the conda build
       string, but every character there is charged against Windows' MAX_PATH.  It is
       also recorded authoritatively inside the package, at isa/etc/ISABELLE_ID.)
  license: BSD-3-Clause
  license_family: BSD
  repository: https://github.com/xqyww123/isabelle-packaging-ci
